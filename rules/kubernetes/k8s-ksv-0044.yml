id:        CBR-K8S-KSV-0044
title:     "No wildcard verb and resource roles"
severity:  critical
languages: ['yaml']
cwe:       ['CWE-732']
source:    trivy/kubernetes-no-wildcard-verb-resource-role
message: |
  Check whether role permits wildcard verb on wildcard resource
  
  Remediation: Create a role which does not permit wildcard verb on wildcard resource
regex: |
  (?:verbs|resources|apiGroups):\s*\n\s*-\s*"\*"
