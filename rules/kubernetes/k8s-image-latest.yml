id:        CBR-K8S-IMAGE-LATEST
title:     "Container image uses latest tag"
severity:  medium
languages: ['yaml']
cwe:       ['CWE-829']
source:    trivy/kubernetes-image-tag-latest
message: |
  Container image uses :latest tag. This makes deployments non-reproducible and may pull unexpected versions.
  
  Remediation: Pin the image to a specific version tag or SHA256 digest.
pattern: |
  image:\s+\S+:latest\b
