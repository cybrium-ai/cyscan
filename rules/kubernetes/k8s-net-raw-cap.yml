id:        CBR-K8S-NET-RAW-CAP
title:     "Container has NET_RAW capability"
severity:  medium
languages: ['yaml']
cwe:       ['CWE-250']
source:    trivy/kubernetes-net-raw-capability
message: |
  Container has NET_RAW capability which allows raw packet crafting and network sniffing.
  
  Remediation: Drop NET_RAW unless the container specifically needs raw socket access.
pattern: |
  add:\s*\n\s*-\s*(?:NET_RAW|"NET_RAW")
