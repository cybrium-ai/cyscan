id:        CBR-K8S-SECRET-ENV-VAR
title:     "Secrets used as environment variables"
severity:  medium
languages: ['yaml']
cwe:       ['CWE-798']
source:    trivy/kubernetes-secret-in-env
message: |
  Secret values exposed as environment variables can leak via process listings, logs, and error reports.
  
  Remediation: Mount secrets as files instead of environment variables.
pattern: |
  valueFrom:\s*\n\s+secretKeyRef:
