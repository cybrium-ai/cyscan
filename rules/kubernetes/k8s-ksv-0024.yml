id:        CBR-K8S-KSV-0024
title:     "Access to host ports"
severity:  high
languages: ['yaml']
cwe:       ['CWE-284']
source:    trivy/kubernetes-no-host-port-access
message: |
  According to pod security standard 'Host Ports', hostPorts should be disallowed, or at minimum restricted to a known list.
  
  Remediation: Do not set spec.containers[*].ports[*].hostPort and spec.initContainers[*].ports[*].hostPort.
regex: |
  hostPort:\s*\d+
