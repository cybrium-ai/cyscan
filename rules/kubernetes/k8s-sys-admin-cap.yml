id:        CBR-K8S-SYS-ADMIN-CAP
title:     "Container has SYS_ADMIN capability"
severity:  critical
languages: ['yaml']
cwe:       ['CWE-250']
source:    trivy/kubernetes-SYS-ADMIN-capability
message: |
  Container has SYS_ADMIN capability which grants near-root level privileges and is a common container escape vector.
  
  Remediation: Remove SYS_ADMIN from capabilities. If needed, use more specific capabilities.
pattern: |
  add:\s*\n\s*-\s*(?:SYS_ADMIN|"SYS_ADMIN")
