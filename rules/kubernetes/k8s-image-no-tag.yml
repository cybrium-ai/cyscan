id:        CBR-K8S-IMAGE-NO-TAG
title:     "Container image without explicit tag"
severity:  medium
languages: ['yaml']
cwe:       ['CWE-829']
source:    trivy/kubernetes-image-no-tag
message: |
  Container image does not specify a tag, defaulting to :latest. This makes deployments non-reproducible.
  
  Remediation: Pin the image to a specific version tag or digest.
pattern: |
  image:\s+[a-zA-Z0-9._/-]+\s*$
