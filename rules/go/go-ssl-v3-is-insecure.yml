id:        CBR-GO-SSL_V3_IS_INSECURE
title:     "Ssl V3 Is Insecure"
severity:  high
languages: ['go']
cwe:       ['CWE-327']
source:    semgrep/ssl-v3-is-insecure
message: |
  SSLv3 is insecure because it has known vulnerabilities. Starting with go1.14, SSLv3 will be removed. Instead, use 'tls.VersionTLS13'.
pattern: |
  tls.Config{..., MinVersion: $TLS.VersionSSL30, ...}
