id:        CBR-GO-USE_TLS
title:     "Use Tls"
severity:  high
languages: ['go']
cwe:       ['CWE-319']
source:    semgrep/use-tls
message: |
  Found an HTTP server without TLS. Use 'http.ListenAndServeTLS' instead. See https://golang.org/pkg/net/http/#ListenAndServeTLS for more information.
pattern: |
  http.ListenAndServe($ADDR, $HANDLER)
fix: |
  http.ListenAndServeTLS($ADDR, certFile, keyFile, $HANDLER)
