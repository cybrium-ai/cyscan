id:        CBR-GO-MISSING_SSL_MINVERSION
title:     "Missing Ssl Minversion"
severity:  high
languages: ['go']
cwe:       ['CWE-327']
source:    semgrep/missing-ssl-minversion
message: |
  `MinVersion` is missing from this TLS configuration.  By default, as of Go 1.22, TLS 1.2 is currently used as the minimum. General purpose web applications should default to TLS 1.3 with all other protocols disabled.  Only where it is known that a web server must support legacy clients with unsupported an insecure browsers (such as Internet Explorer 10), it may be necessary to enable TLS 1.0 to provide support. Add `MinVersion: tls.VersionTLS13' to the TLS configuration to bump the minimum versi
pattern: |
  tls.Config{ $...CONF }
  
fix: |
  tls.Config{ $...CONF, MinVersion: tls.VersionTLS13 }
  
