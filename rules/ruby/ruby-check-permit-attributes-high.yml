id:        CBR-RUBY-CHECK_PERMIT_ATTRIBUTES_HIGH
title:     "Check Permit Attributes High"
severity:  critical
languages: ['ruby']
cwe:       ['CWE-915']
source:    semgrep/check-permit-attributes-high
message: |
  Calling `permit` on security-critical properties like `$ATTRIBUTE` may leave your application vulnerable to mass assignment.
pattern: |
  $P.permit($ATTRIBUTE)
