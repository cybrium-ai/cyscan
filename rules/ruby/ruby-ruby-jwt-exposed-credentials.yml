id:        CBR-RUBY-RUBY_JWT_EXPOSED_CREDENTIALS
title:     "Ruby Jwt Exposed Credentials"
severity:  critical
languages: ['ruby']
cwe:       ['CWE-522']
source:    semgrep/ruby-jwt-exposed-credentials
message: |
  Password is exposed through JWT token payload. This is not encrypted and the password could be compromised. Do not store passwords in JWT tokens.
pattern: |
  $PAYLOAD = {...,password:...,...}
  ...
  JWT.encode($PAYLOAD,...)
  
