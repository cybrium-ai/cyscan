id:        CBR-RUBY-CHECK_PERMIT_ATTRIBUTES_MEDIUM
title:     "Check Permit Attributes Medium"
severity:  high
languages: ['ruby']
cwe:       ['CWE-915']
source:    semgrep/check-permit-attributes-medium
message: |
  Calling `permit` on security-critical properties like `$ATTRIBUTE` may leave your application vulnerable to mass assignment.
pattern: |
  $P.permit($ATTRIBUTE)
