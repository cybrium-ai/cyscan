id:        CBR-RUBY-CHECK_SECRETS
title:     "Check Secrets"
severity:  high
languages: ['ruby']
cwe:       ['CWE-200']
source:    semgrep/check-secrets
message: |
  Found a Brakeman-style secret - a variable with the name password/secret/api_key/rest_auth_site_key and a non-empty string literal value.
pattern: |
  $VAR = "$VALUE"
