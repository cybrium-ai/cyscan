id:        CBR-YAML-NO_NEW_PRIVILEGES
title:     "No New Privileges"
severity:  high
languages: ['yaml']
cwe:       ['CWE-732']
source:    semgrep/no-new-privileges
message: |
  Service '$SERVICE' allows for privilege escalation via setuid or setgid binaries. Add 'no-new-privileges:true' in 'security_opt' to prevent this.
pattern: |
  $SERVICE:
    ...
    image: ...
  
