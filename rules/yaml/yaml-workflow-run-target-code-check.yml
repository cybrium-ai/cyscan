id:        CBR-YAML-WORKFLOW_RUN_TARGET_CODE_CHECK
title:     "Workflow Run Target Code Checkout"
severity:  high
languages: ['yaml']
cwe:       ['CWE-913']
source:    semgrep/workflow-run-target-code-checkout
message: |
  This GitHub Actions workflow file uses `workflow_run` and checks out code from the incoming pull request. When using `workflow_run`, the Action runs in the context of the target repository, which includes access to all repository secrets. Normally, this is safe because the Action only runs code from the target repository, not the incoming PR. However, by checking out the incoming PR code, you're now using the incoming code for the rest of the action. You may be inadvertently executing arbitrary 
pattern: |
  ...
  uses: "$ACTION"
  with:
    ...
    ref: $EXPR
  
