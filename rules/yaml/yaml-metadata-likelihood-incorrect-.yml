id:        CBR-YAML-METADATA_LIKELIHOOD_INCORRECT_
title:     "Metadata Likelihood Incorrect Value"
severity:  high
languages: ['yaml']
source:    semgrep/metadata-likelihood-incorrect-value
message: |
  Semgrep rule likelihood: $VALUE detected, but the value must be LOW, MEDIUM, or HIGH. For more information visit: https://semgrep.dev/docs/contributing/contributing-to-semgrep-rules-repository/
pattern: |
  likelihood: $VALUE
  
