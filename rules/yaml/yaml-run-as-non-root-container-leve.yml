id:        CBR-YAML-RUN_AS_NON_ROOT_CONTAINER_LEVE
title:     "Run As Non Root Container Level Missing Security Context"
severity:  medium
languages: ['yaml']
cwe:       ['CWE-250']
source:    semgrep/run-as-non-root-container-level-missing-security-context
message: |
  When running containers in Kubernetes, it's important to ensure that they are properly secured to prevent privilege escalation attacks. One potential vulnerability is when a container is allowed to run applications as the root user, which could allow an attacker to gain access to sensitive resources. To mitigate this risk, it's recommended to add a `securityContext` to the container, with the parameter `runAsNonRoot` set to `true`. This will ensure that the container runs as a non-root user, lim
pattern: |
  - name: $CONTAINER
    $IMAGE: $IMAGEVAL
    ...
  
fix: |
  securityContext:
    runAsNonRoot: true
  $IMAGE
  
