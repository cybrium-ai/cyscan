id:        CBR-YAML-SELINUX_SEPARATION_DISABLED
title:     "Selinux Separation Disabled"
severity:  high
languages: ['yaml']
cwe:       ['CWE-284']
source:    semgrep/selinux-separation-disabled
message: |
  Service '$SERVICE' is explicitly disabling SELinux separation. This runs the service as an unconfined type. Remove 'label:disable' to prevent this.
pattern: |
  $SERVICE:
    ...
    image: ...
    ...
    security_opt:
      - ...
      - label:disable
  
