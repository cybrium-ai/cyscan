id:        CBR-YAML-INTERFILE_TRUE_UNDER_METADATA_
title:     "Interfile True Under Metadata And No Options"
severity:  high
languages: ['yaml']
source:    semgrep/interfile-true-under-metadata-and-no-options
message: |
  `interfile: true` should be under the `options` field, not the `metadata` field.
pattern: |
  rules:
    - id: $ID
      ...
      $METADATA:
        ...
        $INTERFILE: true
        ...
      ...
  
fix: |
  options:
    interfile: true
  metadata
  
