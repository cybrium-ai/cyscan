id:        CBR-YAML-USE_OF_BASIC_AUTHENTICATION
title:     "Use Of Basic Authentication"
severity:  critical
languages: ['yaml']
cwe:       ['CWE-287']
source:    semgrep/use-of-basic-authentication
message: |
  Basic authentication is considered weak and should be avoided.  Use a different authentication scheme, such of OAuth2, OpenID Connect, or mTLS.
pattern: |
  type: http
  ...
  scheme: basic
  
