id:        CBR-YAML-FLASK_DEBUGGING_ENABLED
title:     "Flask Debugging Enabled"
severity:  high
languages: ['yaml']
cwe:       ['CWE-489']
source:    semgrep/flask-debugging-enabled
message: |
  Do not set FLASK_ENV to "development" since that sets `debug=True` in Flask. Use "dev" or a similar term instead.
pattern: |
  {name: FLASK_ENV, value: "development"}
  
