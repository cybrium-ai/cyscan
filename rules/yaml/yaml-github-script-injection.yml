id:        CBR-YAML-GITHUB_SCRIPT_INJECTION
title:     "Github Script Injection"
severity:  critical
languages: ['yaml']
cwe:       ['CWE-94']
source:    semgrep/github-script-injection
message: |
  Using variable interpolation `${{...}}` with `github` context data in a `actions/github-script`'s `script:` step could allow an attacker to inject their own code into the runner. This would allow them to steal secrets and code. `github` context data can have arbitrary user input and should be treated as untrusted. Instead, use an intermediate environment variable with `env:` to store the data and use the environment variable in the `run:` script. Be sure to use double-quotes the environment vari
pattern: |
  script: $SHELL
