id:        CBR-YAML-SECRETS_IN_CONFIG_FILE
title:     "Secrets In Config File"
severity:  high
languages: ['yaml']
cwe:       ['CWE-798']
source:    semgrep/secrets-in-config-file
message: |
  Secrets ($VALUE) should not be stored in infrastructure as code files. Use an alternative such as Bitnami Sealed Secrets or KSOPS to encrypt Kubernetes Secrets. 
pattern: |
  $KEY: $VALUE
  
