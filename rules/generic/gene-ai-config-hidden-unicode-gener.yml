id:        CBR-GENE-AI_CONFIG_HIDDEN_UNICODE_GENER
title:     "Ai Config Hidden Unicode Generic"
severity:  critical
languages: ['generic']
cwe:       ['CWE-116']
source:    semgrep/ai-config-hidden-unicode-generic
message: |
  Invisible or zero-width Unicode character detected in AI coding assistant config file. These characters can be used in "Rules File Backdoor" attacks to inject hidden malicious instructions that are invisible to developers but interpreted by AI assistants. Remove all zero-width and bidirectional override characters from this file.
regex: |
  [\x{200B}\x{200C}\x{200D}\x{2063}\x{FEFF}\x{202A}-\x{202E}]
