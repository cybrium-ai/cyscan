title:     "Useless Ternary"
severity:  critical
languages: ['typescript', 'javascript']
source:    semgrep/useless-ternary
message: |
  It looks like no matter how $CONDITION is evaluated, this expression returns $ANS. This is probably a copy-paste error.
pattern: |
  $CONDITION ? $ANS : $ANS
  
