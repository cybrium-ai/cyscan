id:        CBR-GENE-SECURE_PARAMETER_FOR_SECRETS
title:     "Secure Parameter For Secrets"
severity:  high
languages: ['generic']
cwe:       ['CWE-532']
source:    semgrep/secure-parameter-for-secrets
message: |
  Mark sensitive parameters with the @secure() decorator. This avoids logging the value or displaying it in the Azure portal, Azure CLI, or Azure PowerShell.
pattern: |
  param $NAME string
