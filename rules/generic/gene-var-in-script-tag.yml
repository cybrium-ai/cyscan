id:        CBR-GENE-VAR_IN_SCRIPT_TAG
title:     "Var In Script Tag"
severity:  high
languages: ['generic']
cwe:       ['CWE-79']
source:    semgrep/var-in-script-tag
message: |
  Detected a template variable used in a script tag. Although template variables are HTML escaped, HTML escaping does not always prevent cross-site scripting (XSS) attacks when used directly in JavaScript. If you need this data on the rendered page, consider placing it in the HTML portion (outside of a script tag). Alternatively, use a JavaScript-specific encoder, such as the one available in OWASP ESAPI. For Django, you may also consider using the 'json_script' template tag and retrieving the dat
pattern: |
  {{ ... }}
