id:        CBR-GENE-MCP_HARDCODED_CONFIG_SECRET_GE
title:     "Mcp Hardcoded Config Secret Generic"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    semgrep/mcp-hardcoded-config-secret-generic
message: |
  Plaintext API key or token detected in MCP configuration file. Hardcoded secrets in config files risk exposure through version control or file sharing. Use environment variable references or a secrets manager instead.
regex: |
  :\s*"sk-[a-zA-Z0-9]{20,}"
