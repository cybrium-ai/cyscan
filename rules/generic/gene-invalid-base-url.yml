id:        CBR-GENE-INVALID_BASE_URL
title:     "Invalid Base Url"
severity:  high
languages: ['generic']
source:    semgrep/invalid-base-url
message: |
  The 'baseURL' is invalid. This may cause links to not work if deployed. Include the scheme (e.g., http:// or https://).
pattern: |
  baseURL = "..."
