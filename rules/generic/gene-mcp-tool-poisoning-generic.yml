id:        CBR-GENE-MCP_TOOL_POISONING_GENERIC
title:     "Mcp Tool Poisoning Generic"
severity:  critical
languages: ['generic']
cwe:       ['CWE-77']
source:    semgrep/mcp-tool-poisoning-generic
message: |
  MCP tool docstring contains suspicious directives that may indicate tool poisoning. Attackers can embed hidden instructions in tool descriptions to manipulate LLM behavior, exfiltrate data, or access sensitive files. Review the tool description for hidden instructions or social engineering.
regex: |
  """[^"]*<IMPORTANT>[^"]*"""
