id:        CBR-GENE-IDE_SETTINGS_EXECUTABLE_PATH_G
title:     "Ide Settings Executable Path Generic"
severity:  high
languages: ['generic']
cwe:       ['CWE-94']
source:    semgrep/ide-settings-executable-path-generic
message: |
  Executable path override detected in VS Code settings pointing to a project-relative path. A malicious repository can override interpreter or tool paths in workspace settings to execute arbitrary code when the project is opened. Use absolute system paths instead of relative paths for executable settings, and review .vscode/settings.json in untrusted repos.
regex: |
  "[^"]*(?:executablePath|ExecutablePath|defaultInterpreterPath|pythonPath|terminal\.integrated\.shell\.\w+)"\s*:\s*"\.\.?/
