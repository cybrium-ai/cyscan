id:        CBR-SECRETS-AWS-KEY
title:     "Hardcoded AWS access key"
severity:  critical
languages: [python, javascript, typescript, go]
cwe:       [CWE-798]
fix_recipe: CWE-798-HARDCODED
message: |
  A literal AWS access key ID is committed to source. Rotate the key
  immediately and move the value to a secret manager (Vault, AWS
  Secrets Manager, environment variables).
# Regex — works across languages, no per-language grammar needed.
regex: |
  \b(AKIA|ASIA)[0-9A-Z]{16}\b
# Replacement is Python-flavoured — on other languages run without --fix
# for this rule, or shadow it with a language-specific variant. Spliced
# in place of the leaked key so the literal never hits git again, but
# the key must still be rotated out-of-band.
fix: 'os.getenv("AWS_ACCESS_KEY_ID")'
