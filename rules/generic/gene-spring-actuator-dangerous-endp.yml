id:        CBR-GENE-SPRING_ACTUATOR_DANGEROUS_ENDP
title:     "Spring Actuator Dangerous Endpoints Enabled"
severity:  high
languages: ['generic']
cwe:       ['CWE-200']
source:    semgrep/spring-actuator-dangerous-endpoints-enabled
message: |
  Spring Boot Actuators "$...ACTUATORS" are enabled. Depending on the actuators, this can pose a significant security risk. Please double-check if the actuators are needed and properly secured.
pattern: |
  management.endpoints.web.exposure.include=$...ACTUATORS
