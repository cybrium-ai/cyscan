id:        CBR-SEC-GL-BITTREX_ACCESS_KEY
title:     "Identified a Bittrex Access Key, which could lead to unauthorized access to cryptocurrency trading a"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/bittrex-access-key
message: |
  Identified a Bittrex Access Key, which could lead to unauthorized access to cryptocurrency trading accounts and financial loss.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:bittrex)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
