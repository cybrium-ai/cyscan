id:        CBR-SEC-GL-GOCARDLESS_API_TOKEN
title:     "Detected a GoCardless API token, potentially risking unauthorized direct debit payment operations an"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gocardless-api-token
message: |
  Detected a GoCardless API token, potentially risking unauthorized direct debit payment operations and financial data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:gocardless)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(live_(?i)[a-z0-9\-_=]{40})(?:[\x60'"\s;]|\\[nr]|$)
