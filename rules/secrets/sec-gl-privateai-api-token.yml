id:        CBR-SEC-GL-PRIVATEAI_API_TOKEN
title:     "Identified a PrivateAI Token, posing a risk of unauthorized access to AI services and data manipulat"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/privateai-api-token
message: |
  Identified a PrivateAI Token, posing a risk of unauthorized access to AI services and data manipulation.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  [\w.-]{0,50}?(?i:[\w.-]{0,50}?(?:private[_-]?ai)(?:[ \t\w.-]{0,20})[\s'"]{0,3})(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
