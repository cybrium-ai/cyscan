id:        CBR-SEC-GL-SLACK_WEBHOOK_URL
title:     "Discovered a Slack Webhook, which could lead to unauthorized message posting and data leakage in Sla"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/slack-webhook-url
message: |
  Discovered a Slack Webhook, which could lead to unauthorized message posting and data leakage in Slack channels.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?:https?://)?hooks.slack.com/(?:services|workflows|triggers)/[A-Za-z0-9+/]{43,56}
