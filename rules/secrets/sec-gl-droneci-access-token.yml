id:        CBR-SEC-GL-DRONECI_ACCESS_TOKEN
title:     "Detected a Droneci Access Token, potentially compromising continuous integration and deployment work"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/droneci-access-token
message: |
  Detected a Droneci Access Token, potentially compromising continuous integration and deployment workflows.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:droneci)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
