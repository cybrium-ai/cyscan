id:        CBR-SEC-GL-SENDINBLUE_API_TOKEN
title:     "Identified a Sendinblue API token, which may compromise email marketing services and subscriber data"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/sendinblue-api-token
message: |
  Identified a Sendinblue API token, which may compromise email marketing services and subscriber data privacy.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(xkeysib-[a-f0-9]{64}\-(?i)[a-z0-9]{16})(?:[\x60'"\s;]|\\[nr]|$)
