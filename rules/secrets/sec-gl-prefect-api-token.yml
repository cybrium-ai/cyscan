id:        CBR-SEC-GL-PREFECT_API_TOKEN
title:     "Detected a Prefect API token, risking unauthorized access to workflow management and automation serv"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/prefect-api-token
message: |
  Detected a Prefect API token, risking unauthorized access to workflow management and automation services.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(pnu_[a-zA-Z0-9]{36})(?:[\x60'"\s;]|\\[nr]|$)
