id:        CBR-SEC-GL-AZURE_AD_CLIENT_SECRET
title:     "Azure AD Client Secret"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/azure-ad-client-secret
message: |
  Azure AD Client Secret
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?:^|[\\'"\x60\s>=:(,)])([a-zA-Z0-9_~.]{3}\dQ~[a-zA-Z0-9_~.-]{31,34})(?:$|[\\'"\x60\s<),])
