id:        CBR-SEC-GL-SLACK_APP_TOKEN
title:     "Detected a Slack App-level token, risking unauthorized access to Slack applications and workspace da"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/slack-app-token
message: |
  Detected a Slack App-level token, risking unauthorized access to Slack applications and workspace data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)xapp-\d-[A-Z0-9]+-\d+-[a-z0-9]+
