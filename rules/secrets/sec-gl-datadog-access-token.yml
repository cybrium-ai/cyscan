id:        CBR-SEC-GL-DATADOG_ACCESS_TOKEN
title:     "Detected a Datadog Access Token, potentially risking monitoring and analytics data exposure and mani"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/datadog-access-token
message: |
  Detected a Datadog Access Token, potentially risking monitoring and analytics data exposure and manipulation.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:datadog)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{40})(?:[\x60'"\s;]|\\[nr]|$)
