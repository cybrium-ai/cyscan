id:        CBR-SEC-GL-LINEAR_CLIENT_SECRET
title:     "Identified a Linear Client Secret, which may compromise secure integrations and sensitive project ma"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/linear-client-secret
message: |
  Identified a Linear Client Secret, which may compromise secure integrations and sensitive project management data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:linear)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
