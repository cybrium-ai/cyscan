id:        CBR-SEC-GL-SUMOLOGIC_ACCESS_TOKEN
title:     "Uncovered a SumoLogic Access Token, which could lead to unauthorized access to log data and analytic"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/sumologic-access-token
message: |
  Uncovered a SumoLogic Access Token, which could lead to unauthorized access to log data and analytics insights.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:(?-i:[Ss]umo|SUMO))(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{64})(?:[\x60'"\s;]|\\[nr]|$)
