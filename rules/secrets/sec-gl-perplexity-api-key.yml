id:        CBR-SEC-GL-PERPLEXITY_API_KEY
title:     "Detected a Perplexity API key, which could lead to unauthorized access to Perplexity AI services and"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/perplexity-api-key
message: |
  Detected a Perplexity API key, which could lead to unauthorized access to Perplexity AI services and data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(pplx-[a-zA-Z0-9]{48})(?:[\x60'"\s;]|\\[nr]|$|\b)
