id:        CBR-SEC-GL-HASHICORP_TF_PASSWORD
title:     "Identified a HashiCorp Terraform password field, risking unauthorized infrastructure configuration a"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/hashicorp-tf-password
message: |
  Identified a HashiCorp Terraform password field, risking unauthorized infrastructure configuration and security breaches.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:administrator_login_password|password)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}("[a-z0-9=_\-]{8,20}")(?:[\x60'"\s;]|\\[nr]|$)
