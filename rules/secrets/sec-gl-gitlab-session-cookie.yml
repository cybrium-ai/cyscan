id:        CBR-SEC-GL-GITLAB_SESSION_COOKIE
title:     "Discovered a GitLab Session Cookie, posing a risk to unauthorized access to a user account."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gitlab-session-cookie
message: |
  Discovered a GitLab Session Cookie, posing a risk to unauthorized access to a user account.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  _gitlab_session=[0-9a-z]{32}
