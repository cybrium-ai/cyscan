id:        CBR-SEC-GL-FACEBOOK_ACCESS_TOKEN
title:     "Discovered a Facebook Access Token, posing a risk of unauthorized access to Facebook accounts and pe"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/facebook-access-token
message: |
  Discovered a Facebook Access Token, posing a risk of unauthorized access to Facebook accounts and personal data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)\b(\d{15,16}(\||%)[0-9a-z\-_]{27,40})(?:[\x60'"\s;]|\\[nr]|$)
