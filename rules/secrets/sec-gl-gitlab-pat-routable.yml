id:        CBR-SEC-GL-GITLAB_PAT_ROUTABLE
title:     "Identified a GitLab Personal Access Token (routable), risking unauthorized access to GitLab reposito"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gitlab-pat-routable
message: |
  Identified a GitLab Personal Access Token (routable), risking unauthorized access to GitLab repositories and codebase exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \bglpat-[0-9a-zA-Z_-]{27,300}\.[0-9a-z]{2}[0-9a-z]{7}\b
