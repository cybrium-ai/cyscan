id:        CBR-SEC-GL-GITLAB_DEPLOY_TOKEN
title:     "Identified a GitLab Deploy Token, risking access to repositories, packages and containers with write"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gitlab-deploy-token
message: |
  Identified a GitLab Deploy Token, risking access to repositories, packages and containers with write access.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  gldt-[0-9a-zA-Z_\-]{20}
