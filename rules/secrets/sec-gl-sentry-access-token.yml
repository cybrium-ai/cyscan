id:        CBR-SEC-GL-SENTRY_ACCESS_TOKEN
title:     "Found a Sentry.io Access Token (old format), risking unauthorized access to error tracking services "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/sentry-access-token
message: |
  Found a Sentry.io Access Token (old format), risking unauthorized access to error tracking services and sensitive application data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:sentry)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{64})(?:[\x60'"\s;]|\\[nr]|$)
