id:        CBR-SEC-DOPPLER-TOKEN
title:     "Doppler Service Token"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks-patterns/curated
message: |
  Doppler Service Token detected in source code. Hardcoded secrets can be
  extracted from source control history, CI logs, or compiled binaries.
  
  Remediation: Remove the secret from code, rotate it immediately,
  and use a secret manager (Vault, AWS Secrets Manager, Azure Key Vault,
  GCP Secret Manager) or environment variables instead.
regex: |
  dp\.st\.[A-Za-z0-9_-]+
