id:        CBR-SEC-GL-PLANETSCALE_API_TOKEN
title:     "Identified a PlanetScale API token, potentially compromising database management and operations."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/planetscale-api-token
message: |
  Identified a PlanetScale API token, potentially compromising database management and operations.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(pscale_tkn_(?i)[\w=\.-]{32,64})(?:[\x60'"\s;]|\\[nr]|$)
