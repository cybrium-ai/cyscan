id:        CBR-SEC-GL-SENDGRID_API_TOKEN
title:     "Detected a SendGrid API token, posing a risk of unauthorized email service operations and data expos"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/sendgrid-api-token
message: |
  Detected a SendGrid API token, posing a risk of unauthorized email service operations and data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(SG\.(?i)[a-z0-9=_\-\.]{66})(?:[\x60'"\s;]|\\[nr]|$)
