id:        CBR-SEC-GL-VAULT_BATCH_TOKEN
title:     "Detected a Vault Batch Token, risking unauthorized access to secret management services and sensitiv"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/vault-batch-token
message: |
  Detected a Vault Batch Token, risking unauthorized access to secret management services and sensitive data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(hvb\.[\w-]{138,300})(?:[\x60'"\s;]|\\[nr]|$)
