id:        CBR-SEC-GL-PLANETSCALE_OAUTH_TOKEN
title:     "Found a PlanetScale OAuth token, posing a risk to database access control and sensitive data integri"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/planetscale-oauth-token
message: |
  Found a PlanetScale OAuth token, posing a risk to database access control and sensitive data integrity.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(pscale_oauth_[\w=\.-]{32,64})(?:[\x60'"\s;]|\\[nr]|$)
