id:        CBR-SEC-GL-ALGOLIA_API_KEY
title:     "Identified an Algolia API Key, which could result in unauthorized search operations and data exposur"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/algolia-api-key
message: |
  Identified an Algolia API Key, which could result in unauthorized search operations and data exposure on Algolia-managed platforms.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:algolia)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
