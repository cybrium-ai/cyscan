id:        CBR-SEC-GL-RAPIDAPI_ACCESS_TOKEN
title:     "Uncovered a RapidAPI Access Token, which could lead to unauthorized access to various APIs and data "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/rapidapi-access-token
message: |
  Uncovered a RapidAPI Access Token, which could lead to unauthorized access to various APIs and data services.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:rapidapi)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9_-]{50})(?:[\x60'"\s;]|\\[nr]|$)
