id:        CBR-SEC-GL-DROPBOX_API_TOKEN
title:     "Identified a Dropbox API secret, which could lead to unauthorized file access and data breaches in D"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/dropbox-api-token
message: |
  Identified a Dropbox API secret, which could lead to unauthorized file access and data breaches in Dropbox storage.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:dropbox)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{15})(?:[\x60'"\s;]|\\[nr]|$)
