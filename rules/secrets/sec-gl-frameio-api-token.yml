id:        CBR-SEC-GL-FRAMEIO_API_TOKEN
title:     "Found a Frame.io API token, potentially compromising video collaboration and project management."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/frameio-api-token
message: |
  Found a Frame.io API token, potentially compromising video collaboration and project management.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  fio-u-(?i)[a-z0-9\-_=]{64}
