id:        CBR-SEC-GL-MATTERMOST_ACCESS_TOKEN
title:     "Identified a Mattermost Access Token, which may compromise team communication channels and data priv"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/mattermost-access-token
message: |
  Identified a Mattermost Access Token, which may compromise team communication channels and data privacy.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:mattermost)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{26})(?:[\x60'"\s;]|\\[nr]|$)
