id:        CBR-SEC-GL-TWITCH_API_TOKEN
title:     "Discovered a Twitch API token, which could compromise streaming services and account integrations."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/twitch-api-token
message: |
  Discovered a Twitch API token, which could compromise streaming services and account integrations.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:twitch)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{30})(?:[\x60'"\s;]|\\[nr]|$)
