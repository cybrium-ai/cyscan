id:        CBR-SEC-GL-SHOPIFY_PRIVATE_APP_ACCESS_TOKEN
title:     "Identified a Shopify private app access token, risking unauthorized access to private app data and s"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/shopify-private-app-access-token
message: |
  Identified a Shopify private app access token, risking unauthorized access to private app data and store operations.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  shppa_[a-fA-F0-9]{32}
