id:        CBR-SEC-GL-PULUMI_API_TOKEN
title:     "Found a Pulumi API token, posing a risk to infrastructure as code services and cloud resource manage"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/pulumi-api-token
message: |
  Found a Pulumi API token, posing a risk to infrastructure as code services and cloud resource management.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(pul-[a-f0-9]{40})(?:[\x60'"\s;]|\\[nr]|$)
