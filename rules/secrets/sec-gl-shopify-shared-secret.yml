id:        CBR-SEC-GL-SHOPIFY_SHARED_SECRET
title:     "Found a Shopify shared secret, posing a risk to application authentication and e-commerce platform s"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/shopify-shared-secret
message: |
  Found a Shopify shared secret, posing a risk to application authentication and e-commerce platform security.
  
