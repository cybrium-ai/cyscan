id:        CBR-SEC-GL-CLOUDFLARE_API_KEY
title:     "Detected a Cloudflare API Key, potentially compromising cloud application deployments and operationa"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/cloudflare-api-key
message: |
  Detected a Cloudflare API Key, potentially compromising cloud application deployments and operational security.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:cloudflare)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9_-]{40})(?:[\x60'"\s;]|\\[nr]|$)
