id:        CBR-SEC-GL-OPENAI_API_KEY
title:     "Found an OpenAI API Key, posing a risk of unauthorized access to AI services and data manipulation."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/openai-api-key
message: |
  Found an OpenAI API Key, posing a risk of unauthorized access to AI services and data manipulation.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(sk-(?:proj|svcacct|admin)-(?:[A-Za-z0-9_-]{74}|[A-Za-z0-9_-]{58})T3BlbkFJ(?:[A-Za-z0-9_-]{74}|[A-Za-z0-9_-]{58})\b|sk-[a-zA-Z0-9]{20}T3BlbkFJ[a-zA-Z0-9]{20})(?:[\x60'"\s;]|\\[nr]|$)
