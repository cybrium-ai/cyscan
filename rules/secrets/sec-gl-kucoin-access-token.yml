id:        CBR-SEC-GL-KUCOIN_ACCESS_TOKEN
title:     "Found a Kucoin Access Token, risking unauthorized access to cryptocurrency exchange services and tra"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/kucoin-access-token
message: |
  Found a Kucoin Access Token, risking unauthorized access to cryptocurrency exchange services and transactions.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:kucoin)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{24})(?:[\x60'"\s;]|\\[nr]|$)
