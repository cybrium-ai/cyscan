id:        CBR-SEC-GL-FRESHBOOKS_ACCESS_TOKEN
title:     "Discovered a Freshbooks Access Token, posing a risk to accounting software access and sensitive fina"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/freshbooks-access-token
message: |
  Discovered a Freshbooks Access Token, posing a risk to accounting software access and sensitive financial data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:freshbooks)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{64})(?:[\x60'"\s;]|\\[nr]|$)
