id:        CBR-SEC-GL-PLANETSCALE_PASSWORD
title:     "Discovered a PlanetScale password, which could lead to unauthorized database operations and data bre"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/planetscale-password
message: |
  Discovered a PlanetScale password, which could lead to unauthorized database operations and data breaches.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)\b(pscale_pw_(?i)[\w=\.-]{32,64})(?:[\x60'"\s;]|\\[nr]|$)
