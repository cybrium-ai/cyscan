id:        CBR-SEC-GL-MAPBOX_API_TOKEN
title:     "Detected a MapBox API token, posing a risk to geospatial services and sensitive location data exposu"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/mapbox-api-token
message: |
  Detected a MapBox API token, posing a risk to geospatial services and sensitive location data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:mapbox)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(pk\.[a-z0-9]{60}\.[a-z0-9]{22})(?:[\x60'"\s;]|\\[nr]|$)
