id:        CBR-SEC-GL-SIDEKIQ_SENSITIVE_URL
title:     "Uncovered a Sidekiq Sensitive URL, potentially exposing internal job queues and sensitive operation "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/sidekiq-sensitive-url
message: |
  Uncovered a Sidekiq Sensitive URL, potentially exposing internal job queues and sensitive operation details.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)\bhttps?://([a-f0-9]{8}:[a-f0-9]{8})@(?:gems.contribsys.com|enterprise.contribsys.com)(?:[\/|\#|\?|:]|$)
