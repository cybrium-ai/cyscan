id:        CBR-SEC-GL-NEW_RELIC_BROWSER_API_TOKEN
title:     "Identified a New Relic ingest browser API token, risking unauthorized access to application performa"
severity:  medium
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/new-relic-browser-api-token
message: |
  Identified a New Relic ingest browser API token, risking unauthorized access to application performance data and analytics.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:new-relic|newrelic|new_relic)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(NRJS-[a-f0-9]{19})(?:[\x60'"\s;]|\\[nr]|$)
