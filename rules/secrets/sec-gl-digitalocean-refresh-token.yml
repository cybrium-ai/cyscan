id:        CBR-SEC-GL-DIGITALOCEAN_REFRESH_TOKEN
title:     "Uncovered a DigitalOcean OAuth Refresh Token, which could allow prolonged unauthorized access and re"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/digitalocean-refresh-token
message: |
  Uncovered a DigitalOcean OAuth Refresh Token, which could allow prolonged unauthorized access and resource manipulation.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)\b(dor_v1_[a-f0-9]{64})(?:[\x60'"\s;]|\\[nr]|$)
