id:        CBR-SEC-GL-PRIVATE_KEY
title:     "Identified a Private Key, which may compromise cryptographic security and sensitive data encryption."
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/private-key
message: |
  Identified a Private Key, which may compromise cryptographic security and sensitive data encryption.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)-----BEGIN[ A-Z0-9_-]{0,100}PRIVATE KEY(?: BLOCK)?-----[\s\S-]{64,}?KEY(?: BLOCK)?-----
