id:        CBR-SEC-GL-MESSAGEBIRD_API_TOKEN
title:     "Found a MessageBird API token, risking unauthorized access to communication platforms and message da"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/messagebird-api-token
message: |
  Found a MessageBird API token, risking unauthorized access to communication platforms and message data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:message[_-]?bird)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{25})(?:[\x60'"\s;]|\\[nr]|$)
