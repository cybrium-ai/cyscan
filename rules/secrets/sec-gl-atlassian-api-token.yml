id:        CBR-SEC-GL-ATLASSIAN_API_TOKEN
title:     "Detected an Atlassian API token, posing a threat to project management and collaboration tool securi"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/atlassian-api-token
message: |
  Detected an Atlassian API token, posing a threat to project management and collaboration tool security and data confidentiality.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:(?-i:ATLASSIAN|[Aa]tlassian)|(?-i:CONFLUENCE|[Cc]onfluence)|(?-i:JIRA|[Jj]ira))(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{20}[a-f0-9]{4})(?:[\x60'"\s;]|\\[nr]|$)|\b(ATATT3[A-Za-z0-9_\-=]{186})(?:[\x60'"\s;]|\\[nr]|$)
