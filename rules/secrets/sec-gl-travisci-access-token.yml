id:        CBR-SEC-GL-TRAVISCI_ACCESS_TOKEN
title:     "Identified a Travis CI Access Token, potentially compromising continuous integration services and co"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/travisci-access-token
message: |
  Identified a Travis CI Access Token, potentially compromising continuous integration services and codebase security.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:travis)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{22})(?:[\x60'"\s;]|\\[nr]|$)
