id:        CBR-SEC-GL-FLYIO_ACCESS_TOKEN
title:     "Uncovered a Fly.io API key"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/flyio-access-token
message: |
  Uncovered a Fly.io API key
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b((?:fo1_[\w-]{43}|fm1[ar]_[a-zA-Z0-9+\/]{100,}={0,3}|fm2_[a-zA-Z0-9+\/]{100,}={0,3}))(?:[\x60'"\s;]|\\[nr]|$)
