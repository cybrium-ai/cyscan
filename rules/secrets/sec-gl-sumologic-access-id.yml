id:        CBR-SEC-GL-SUMOLOGIC_ACCESS_ID
title:     "Discovered a SumoLogic Access ID, potentially compromising log management services and data analytic"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/sumologic-access-id
message: |
  Discovered a SumoLogic Access ID, potentially compromising log management services and data analytics integrity.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  [\w.-]{0,50}?(?i:[\w.-]{0,50}?(?:(?-i:[Ss]umo|SUMO))(?:[ \t\w.-]{0,20})[\s'"]{0,3})(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(su[a-zA-Z0-9]{12})(?:[\x60'"\s;]|\\[nr]|$)
