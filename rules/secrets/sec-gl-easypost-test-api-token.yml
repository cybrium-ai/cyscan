id:        CBR-SEC-GL-EASYPOST_TEST_API_TOKEN
title:     "Detected an EasyPost test API token, risking exposure of test environments and potentially sensitive"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/easypost-test-api-token
message: |
  Detected an EasyPost test API token, risking exposure of test environments and potentially sensitive shipment data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \bEZTK(?i)[a-z0-9]{54}\b
