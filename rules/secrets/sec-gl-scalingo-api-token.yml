id:        CBR-SEC-GL-SCALINGO_API_TOKEN
title:     "Found a Scalingo API token, posing a risk to cloud platform services and application deployment secu"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/scalingo-api-token
message: |
  Found a Scalingo API token, posing a risk to cloud platform services and application deployment security.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(tk-us-[\w-]{48})(?:[\x60'"\s;]|\\[nr]|$)
