id:        CBR-SEC-GL-ADAFRUIT_API_KEY
title:     "Identified a potential Adafruit API Key, which could lead to unauthorized access to Adafruit service"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/adafruit-api-key
message: |
  Identified a potential Adafruit API Key, which could lead to unauthorized access to Adafruit services and sensitive data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:adafruit)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9_-]{32})(?:[\x60'"\s;]|\\[nr]|$)
