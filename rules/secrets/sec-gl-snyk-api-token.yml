id:        CBR-SEC-GL-SNYK_API_TOKEN
title:     "Uncovered a Snyk API token, potentially compromising software vulnerability scanning and code securi"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/snyk-api-token
message: |
  Uncovered a Snyk API token, potentially compromising software vulnerability scanning and code security.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:snyk[_.-]?(?:(?:api|oauth)[_.-]?)?(?:key|token))(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(?:[\x60'"\s;]|\\[nr]|$)
