id:        CBR-SEC-GL-NETLIFY_ACCESS_TOKEN
title:     "Detected a Netlify Access Token, potentially compromising web hosting services and site management."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/netlify-access-token
message: |
  Detected a Netlify Access Token, potentially compromising web hosting services and site management.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:netlify)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9=_\-]{40,46})(?:[\x60'"\s;]|\\[nr]|$)
