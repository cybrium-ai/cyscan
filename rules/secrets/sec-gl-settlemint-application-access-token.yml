id:        CBR-SEC-GL-SETTLEMINT_APPLICATION_ACCESS_TOKEN
title:     "Found a Settlemint Application Access Token."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/settlemint-application-access-token
message: |
  Found a Settlemint Application Access Token.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(sm_aat_[a-zA-Z0-9]{16})(?:[\x60'"\s;]|\\[nr]|$)
