id:        CBR-SEC-GL-SLACK_USER_TOKEN
title:     "Found a Slack User token, posing a risk of unauthorized user impersonation and data access within Sl"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/slack-user-token
message: |
  Found a Slack User token, posing a risk of unauthorized user impersonation and data access within Slack workspaces.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  xox[pe](?:-[0-9]{10,13}){3}-[a-zA-Z0-9-]{28,34}
