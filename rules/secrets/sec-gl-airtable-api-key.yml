id:        CBR-SEC-GL-AIRTABLE_API_KEY
title:     "Uncovered a possible Airtable API Key, potentially compromising database access and leading to data "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/airtable-api-key
message: |
  Uncovered a possible Airtable API Key, potentially compromising database access and leading to data leakage or alteration.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:airtable)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{17})(?:[\x60'"\s;]|\\[nr]|$)
