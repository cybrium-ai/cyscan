id:        CBR-SEC-GL-CLOUDFLARE_ORIGIN_CA_KEY
title:     "Detected a Cloudflare Origin CA Key, potentially compromising cloud application deployments and oper"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/cloudflare-origin-ca-key
message: |
  Detected a Cloudflare Origin CA Key, potentially compromising cloud application deployments and operational security.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(v1\.0-[a-f0-9]{24}-[a-f0-9]{146})(?:[\x60'"\s;]|\\[nr]|$)
