id:        CBR-SEC-GL-CURL_AUTH_USER
title:     "Discovered a potential basic authorization token provided in a curl command, which could compromise "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/curl-auth-user
message: |
  Discovered a potential basic authorization token provided in a curl command, which could compromise the curl accessed resource.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \bcurl\b(?:.*|.*(?:[\r\n]{1,2}.*){1,5})[ \t\n\r](?:-u|--user)(?:=|[ \t]{0,5})("(:[^"]{3,}|[^:"]{3,}:|[^:"]{3,}:[^"]{3,})"|'([^:']{3,}:[^']{3,})'|((?:"[^"]{3,}"|'[^']{3,}'|[\w$@.-]+):(?:"[^"]{3,}"|'[^']{3,}'|[\w${}@.-]+)))(?:\s|\z)
