id:        CBR-SEC-GL-GITLAB_FEED_TOKEN
title:     "Identified a GitLab feed token, risking exposure of user data."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gitlab-feed-token
message: |
  Identified a GitLab feed token, risking exposure of user data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  glft-[0-9a-zA-Z_\-]{20}
