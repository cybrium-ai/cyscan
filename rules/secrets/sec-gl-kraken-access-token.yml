id:        CBR-SEC-GL-KRAKEN_ACCESS_TOKEN
title:     "Identified a Kraken Access Token, potentially compromising cryptocurrency trading accounts and finan"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/kraken-access-token
message: |
  Identified a Kraken Access Token, potentially compromising cryptocurrency trading accounts and financial security.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:kraken)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9\/=_\+\-]{80,90})(?:[\x60'"\s;]|\\[nr]|$)
