id:        CBR-SEC-GL-NPM_ACCESS_TOKEN
title:     "Uncovered an npm access token, potentially compromising package management and code repository acces"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/npm-access-token
message: |
  Uncovered an npm access token, potentially compromising package management and code repository access.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)\b(npm_[a-z0-9]{36})(?:[\x60'"\s;]|\\[nr]|$)
