id:        CBR-SEC-GL-SQUARESPACE_ACCESS_TOKEN
title:     "Identified a Squarespace Access Token, which may compromise website management and content control o"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/squarespace-access-token
message: |
  Identified a Squarespace Access Token, which may compromise website management and content control on Squarespace.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:squarespace)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(?:[\x60'"\s;]|\\[nr]|$)
