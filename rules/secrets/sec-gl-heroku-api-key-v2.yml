id:        CBR-SEC-GL-HEROKU_API_KEY_V2
title:     "Detected a Heroku API Key, potentially compromising cloud application deployments and operational se"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/heroku-api-key-v2
message: |
  Detected a Heroku API Key, potentially compromising cloud application deployments and operational security.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b((HRKU-AA[0-9a-zA-Z_-]{58}))(?:[\x60'"\s;]|\\[nr]|$)
