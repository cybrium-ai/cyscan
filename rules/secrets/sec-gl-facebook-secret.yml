id:        CBR-SEC-GL-FACEBOOK_SECRET
title:     "Discovered a Facebook Application secret, posing a risk of unauthorized access to Facebook accounts "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/facebook-secret
message: |
  Discovered a Facebook Application secret, posing a risk of unauthorized access to Facebook accounts and personal data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:facebook)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
