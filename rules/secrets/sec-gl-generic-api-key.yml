id:        CBR-SEC-GL-GENERIC_API_KEY
title:     "Detected a Generic API Key, potentially exposing access to various services and sensitive operations"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/generic-api-key
message: |
  Detected a Generic API Key, potentially exposing access to various services and sensitive operations.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:access|auth|(?-i:[Aa]pi|API)|credential|creds|key|passw(?:or)?d|secret|token)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([\w.=-]{10,150}|[a-z0-9][a-z0-9+/]{11,}={0,3})(?:[\x60'"\s;]|\\[nr]|$)
