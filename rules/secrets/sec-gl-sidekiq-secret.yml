id:        CBR-SEC-GL-SIDEKIQ_SECRET
title:     "Discovered a Sidekiq Secret, which could lead to compromised background job processing and applicati"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/sidekiq-secret
message: |
  Discovered a Sidekiq Secret, which could lead to compromised background job processing and application data breaches.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:BUNDLE_ENTERPRISE__CONTRIBSYS__COM|BUNDLE_GEMS__CONTRIBSYS__COM)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{8}:[a-f0-9]{8})(?:[\x60'"\s;]|\\[nr]|$)
