id:        CBR-SEC-GENERIC-CONNECTION-STRING
title:     "Connection string with embedded password"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks-patterns/curated
message: |
  Connection string with embedded password detected in source code. Hardcoded secrets can be
  extracted from source control history, CI logs, or compiled binaries.
  
  Remediation: Remove the secret from code, rotate it immediately,
  and use a secret manager (Vault, AWS Secrets Manager, Azure Key Vault,
  GCP Secret Manager) or environment variables instead.
pattern: |
  (?:connection_string|conn_str|DATABASE_URL)\s*[=:]\s*["\']?\w+://\w+:[^@\s]+@
