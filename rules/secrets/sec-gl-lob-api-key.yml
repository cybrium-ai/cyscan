id:        CBR-SEC-GL-LOB_API_KEY
title:     "Uncovered a Lob API Key, which could lead to unauthorized access to mailing and address verification"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/lob-api-key
message: |
  Uncovered a Lob API Key, which could lead to unauthorized access to mailing and address verification services.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:lob)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}((live|test)_[a-f0-9]{35})(?:[\x60'"\s;]|\\[nr]|$)
