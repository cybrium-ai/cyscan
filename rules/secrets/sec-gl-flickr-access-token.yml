id:        CBR-SEC-GL-FLICKR_ACCESS_TOKEN
title:     "Discovered a Flickr Access Token, posing a risk of unauthorized photo management and potential data "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/flickr-access-token
message: |
  Discovered a Flickr Access Token, posing a risk of unauthorized photo management and potential data leakage.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:flickr)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
