id:        CBR-SEC-GL-SETTLEMINT_SERVICE_ACCESS_TOKEN
title:     "Found a Settlemint Service Access Token."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/settlemint-service-access-token
message: |
  Found a Settlemint Service Access Token.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(sm_sat_[a-zA-Z0-9]{16})(?:[\x60'"\s;]|\\[nr]|$)
