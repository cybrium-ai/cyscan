id:        CBR-SEC-GL-JWT
title:     "Uncovered a JSON Web Token, which may lead to unauthorized access to web applications and sensitive "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/jwt
message: |
  Uncovered a JSON Web Token, which may lead to unauthorized access to web applications and sensitive user data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(ey[a-zA-Z0-9]{17,}\.ey[a-zA-Z0-9\/\\_-]{17,}\.(?:[a-zA-Z0-9\/\\_-]{10,}={0,2})?)(?:[\x60'"\s;]|\\[nr]|$)
