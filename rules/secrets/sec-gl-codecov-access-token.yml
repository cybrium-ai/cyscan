id:        CBR-SEC-GL-CODECOV_ACCESS_TOKEN
title:     "Found a pattern resembling a Codecov Access Token, posing a risk of unauthorized access to code cove"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/codecov-access-token
message: |
  Found a pattern resembling a Codecov Access Token, posing a risk of unauthorized access to code coverage reports and sensitive data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:codecov)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
