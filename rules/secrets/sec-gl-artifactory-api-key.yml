id:        CBR-SEC-GL-ARTIFACTORY_API_KEY
title:     "Detected an Artifactory api key, posing a risk unauthorized access to the central repository."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/artifactory-api-key
message: |
  Detected an Artifactory api key, posing a risk unauthorized access to the central repository.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \bAKCp[A-Za-z0-9]{69}\b
