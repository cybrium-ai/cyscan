id:        CBR-SEC-GL-HARNESS_API_KEY
title:     "Identified a Harness Access Token (PAT or SAT), risking unauthorized access to a Harness account."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/harness-api-key
message: |
  Identified a Harness Access Token (PAT or SAT), risking unauthorized access to a Harness account.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?:pat|sat)\.[a-zA-Z0-9_-]{22}\.[a-zA-Z0-9]{24}\.[a-zA-Z0-9]{20}
