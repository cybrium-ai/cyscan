id:        CBR-SEC-GL-DOPPLER_API_TOKEN
title:     "Discovered a Doppler API token, posing a risk to environment and secrets management security."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/doppler-api-token
message: |
  Discovered a Doppler API token, posing a risk to environment and secrets management security.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  dp\.pt\.(?i)[a-z0-9]{43}
