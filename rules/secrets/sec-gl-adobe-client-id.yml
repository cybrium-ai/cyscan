id:        CBR-SEC-GL-ADOBE_CLIENT_ID
title:     "Detected a pattern that resembles an Adobe OAuth Web Client ID, posing a risk of compromised Adobe i"
severity:  medium
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/adobe-client-id
message: |
  Detected a pattern that resembles an Adobe OAuth Web Client ID, posing a risk of compromised Adobe integrations and data breaches.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:adobe)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
