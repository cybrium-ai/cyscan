id:        CBR-SEC-GL-COINBASE_ACCESS_TOKEN
title:     "Detected a Coinbase Access Token, posing a risk of unauthorized access to cryptocurrency accounts an"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/coinbase-access-token
message: |
  Detected a Coinbase Access Token, posing a risk of unauthorized access to cryptocurrency accounts and financial transactions.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:coinbase)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9_-]{64})(?:[\x60'"\s;]|\\[nr]|$)
