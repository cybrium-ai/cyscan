id:        CBR-SEC-GL-TYPEFORM_API_TOKEN
title:     "Uncovered a Typeform API token, which could lead to unauthorized survey management and data collecti"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/typeform-api-token
message: |
  Uncovered a Typeform API token, which could lead to unauthorized survey management and data collection.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:typeform)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(tfp_[a-z0-9\-_\.=]{59})(?:[\x60'"\s;]|\\[nr]|$)
