id:        CBR-SEC-GL-GRAFANA_CLOUD_API_TOKEN
title:     "Found a Grafana cloud API token, risking unauthorized access to cloud-based monitoring services and "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/grafana-cloud-api-token
message: |
  Found a Grafana cloud API token, risking unauthorized access to cloud-based monitoring services and data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)\b(glc_[A-Za-z0-9+/]{32,400}={0,3})(?:[\x60'"\s;]|\\[nr]|$)
