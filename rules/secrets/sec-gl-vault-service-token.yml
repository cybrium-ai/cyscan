id:        CBR-SEC-GL-VAULT_SERVICE_TOKEN
title:     "Identified a Vault Service Token, potentially compromising infrastructure security and access to sen"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/vault-service-token
message: |
  Identified a Vault Service Token, potentially compromising infrastructure security and access to sensitive credentials.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b((?:hvs\.[\w-]{90,120}|s\.(?i:[a-z0-9]{24})))(?:[\x60'"\s;]|\\[nr]|$)
