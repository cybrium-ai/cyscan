id:        CBR-SEC-GL-NYTIMES_ACCESS_TOKEN
title:     "Detected a Nytimes Access Token, risking unauthorized access to New York Times APIs and content serv"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/nytimes-access-token
message: |
  Detected a Nytimes Access Token, risking unauthorized access to New York Times APIs and content services.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:nytimes|new-york-times,|newyorktimes)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9=_\-]{32})(?:[\x60'"\s;]|\\[nr]|$)
