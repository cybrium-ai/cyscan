id:        CBR-SEC-GL-COHERE_API_TOKEN
title:     "Identified a Cohere Token, posing a risk of unauthorized access to AI services and data manipulation"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/cohere-api-token
message: |
  Identified a Cohere Token, posing a risk of unauthorized access to AI services and data manipulation.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  [\w.-]{0,50}?(?i:[\w.-]{0,50}?(?:cohere|CO_API_KEY)(?:[ \t\w.-]{0,20})[\s'"]{0,3})(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-zA-Z0-9]{40})(?:[\x60'"\s;]|\\[nr]|$)
