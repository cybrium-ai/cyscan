id:        CBR-SEC-GL-CLICKHOUSE_CLOUD_API_SECRET_KEY
title:     "Identified a pattern that may indicate clickhouse cloud API secret key, risking unauthorized clickho"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/clickhouse-cloud-api-secret-key
message: |
  Identified a pattern that may indicate clickhouse cloud API secret key, risking unauthorized clickhouse cloud api access and data breaches on ClickHouse Cloud platforms.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(4b1d[A-Za-z0-9]{38})\b
