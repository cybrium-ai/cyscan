id:        CBR-SEC-GL-GITLAB_INCOMING_MAIL_TOKEN
title:     "Identified a GitLab incoming mail token, risking manipulation of data sent by mail."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gitlab-incoming-mail-token
message: |
  Identified a GitLab incoming mail token, risking manipulation of data sent by mail.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  glimt-[0-9a-zA-Z_\-]{25}
