id:        CBR-SEC-GL-MAILCHIMP_API_KEY
title:     "Identified a Mailchimp API key, potentially compromising email marketing campaigns and subscriber da"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/mailchimp-api-key
message: |
  Identified a Mailchimp API key, potentially compromising email marketing campaigns and subscriber data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:MailchimpSDK.initialize|mailchimp)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{32}-us\d\d)(?:[\x60'"\s;]|\\[nr]|$)
