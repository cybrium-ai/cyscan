id:        CBR-SEC-GL-GITHUB_REFRESH_TOKEN
title:     "Detected a GitHub Refresh Token, which could allow prolonged unauthorized access to GitHub services."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/github-refresh-token
message: |
  Detected a GitHub Refresh Token, which could allow prolonged unauthorized access to GitHub services.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  ghr_[0-9a-zA-Z]{36}
