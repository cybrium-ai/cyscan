id:        CBR-SEC-GL-GITLAB_SCIM_TOKEN
title:     "Discovered a GitLab SCIM Token, posing a risk to unauthorized access for a organization or instance."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gitlab-scim-token
message: |
  Discovered a GitLab SCIM Token, posing a risk to unauthorized access for a organization or instance.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  glsoat-[0-9a-zA-Z_\-]{20}
