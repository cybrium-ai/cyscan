id:        CBR-SEC-GL-CONTENTFUL_DELIVERY_API_TOKEN
title:     "Discovered a Contentful delivery API token, posing a risk to content management systems and data int"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/contentful-delivery-api-token
message: |
  Discovered a Contentful delivery API token, posing a risk to content management systems and data integrity.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:contentful)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9=_\-]{43})(?:[\x60'"\s;]|\\[nr]|$)
