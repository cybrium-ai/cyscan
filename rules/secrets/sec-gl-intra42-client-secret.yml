id:        CBR-SEC-GL-INTRA42_CLIENT_SECRET
title:     "Found a Intra42 client secret, which could lead to unauthorized access to the 42School API and sensi"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/intra42-client-secret
message: |
  Found a Intra42 client secret, which could lead to unauthorized access to the 42School API and sensitive data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(s-s4t2(?:ud|af)-(?i)[abcdef0123456789]{64})(?:[\x60'"\s;]|\\[nr]|$)
