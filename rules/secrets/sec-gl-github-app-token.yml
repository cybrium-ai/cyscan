id:        CBR-SEC-GL-GITHUB_APP_TOKEN
title:     "Identified a GitHub App Token, which may compromise GitHub application integrations and source code "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/github-app-token
message: |
  Identified a GitHub App Token, which may compromise GitHub application integrations and source code security.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?:ghu|ghs)_[0-9a-zA-Z]{36}
