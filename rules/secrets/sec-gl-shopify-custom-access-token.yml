id:        CBR-SEC-GL-SHOPIFY_CUSTOM_ACCESS_TOKEN
title:     "Detected a Shopify custom access token, potentially compromising custom app integrations and e-comme"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/shopify-custom-access-token
message: |
  Detected a Shopify custom access token, potentially compromising custom app integrations and e-commerce data security.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  shpca_[a-fA-F0-9]{32}
