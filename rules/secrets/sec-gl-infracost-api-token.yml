id:        CBR-SEC-GL-INFRACOST_API_TOKEN
title:     "Detected an Infracost API Token, risking unauthorized access to cloud cost estimation tools and fina"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/infracost-api-token
message: |
  Detected an Infracost API Token, risking unauthorized access to cloud cost estimation tools and financial data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(ico-[a-zA-Z0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
