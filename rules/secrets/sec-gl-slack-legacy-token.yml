id:        CBR-SEC-GL-SLACK_LEGACY_TOKEN
title:     "Detected a Slack Legacy token, risking unauthorized access to older Slack integrations and user data"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/slack-legacy-token
message: |
  Detected a Slack Legacy token, risking unauthorized access to older Slack integrations and user data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  xox[os]-\d+-\d+-\d+-[a-fA-F\d]+
