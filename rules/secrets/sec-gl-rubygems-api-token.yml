id:        CBR-SEC-GL-RUBYGEMS_API_TOKEN
title:     "Identified a Rubygem API token, potentially compromising Ruby library distribution and package manag"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/rubygems-api-token
message: |
  Identified a Rubygem API token, potentially compromising Ruby library distribution and package management.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(rubygems_[a-f0-9]{48})(?:[\x60'"\s;]|\\[nr]|$)
