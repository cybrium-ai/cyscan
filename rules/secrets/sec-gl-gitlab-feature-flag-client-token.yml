id:        CBR-SEC-GL-GITLAB_FEATURE_FLAG_CLIENT_TOKEN
title:     "Identified a GitLab feature flag client token, risks exposing user lists and features flags used by "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gitlab-feature-flag-client-token
message: |
  Identified a GitLab feature flag client token, risks exposing user lists and features flags used by an application.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  glffct-[0-9a-zA-Z_\-]{20}
