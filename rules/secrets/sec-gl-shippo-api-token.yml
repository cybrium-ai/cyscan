id:        CBR-SEC-GL-SHIPPO_API_TOKEN
title:     "Discovered a Shippo API token, potentially compromising shipping services and customer order data."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/shippo-api-token
message: |
  Discovered a Shippo API token, potentially compromising shipping services and customer order data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(shippo_(?:live|test)_[a-fA-F0-9]{40})(?:[\x60'"\s;]|\\[nr]|$)
