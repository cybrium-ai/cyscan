id:        CBR-SEC-HASHICORP-TF-TOKEN
title:     "HashiCorp Terraform Cloud Token"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks-patterns/curated
message: |
  HashiCorp Terraform Cloud Token detected in source code. Hardcoded secrets can be
  extracted from source control history, CI logs, or compiled binaries.
  
  Remediation: Remove the secret from code, rotate it immediately,
  and use a secret manager (Vault, AWS Secrets Manager, Azure Key Vault,
  GCP Secret Manager) or environment variables instead.
pattern: |
  (?:TFE_TOKEN|ATLAS_TOKEN|credentials\s+"app\.terraform\.io")[^}]*token\s*=\s*"[A-Za-z0-9.]+"
