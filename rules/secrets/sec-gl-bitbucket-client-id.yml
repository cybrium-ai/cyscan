id:        CBR-SEC-GL-BITBUCKET_CLIENT_ID
title:     "Discovered a potential Bitbucket Client ID, risking unauthorized repository access and potential cod"
severity:  medium
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/bitbucket-client-id
message: |
  Discovered a potential Bitbucket Client ID, risking unauthorized repository access and potential codebase exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:bitbucket)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
