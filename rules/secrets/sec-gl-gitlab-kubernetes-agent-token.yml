id:        CBR-SEC-GL-GITLAB_KUBERNETES_AGENT_TOKEN
title:     "Identified a GitLab Kubernetes Agent token, risking access to repos and registry of projects connect"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gitlab-kubernetes-agent-token
message: |
  Identified a GitLab Kubernetes Agent token, risking access to repos and registry of projects connected via agent.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  glagent-[0-9a-zA-Z_\-]{50}
