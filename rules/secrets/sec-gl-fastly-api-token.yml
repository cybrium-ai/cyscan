id:        CBR-SEC-GL-FASTLY_API_TOKEN
title:     "Uncovered a Fastly API key, which may compromise CDN and edge cloud services, leading to content del"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/fastly-api-token
message: |
  Uncovered a Fastly API key, which may compromise CDN and edge cloud services, leading to content delivery and security issues.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:fastly)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9=_\-]{32})(?:[\x60'"\s;]|\\[nr]|$)
