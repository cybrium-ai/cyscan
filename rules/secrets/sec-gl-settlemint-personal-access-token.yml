id:        CBR-SEC-GL-SETTLEMINT_PERSONAL_ACCESS_TOKEN
title:     "Found a Settlemint Personal Access Token."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/settlemint-personal-access-token
message: |
  Found a Settlemint Personal Access Token.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(sm_pat_[a-zA-Z0-9]{16})(?:[\x60'"\s;]|\\[nr]|$)
