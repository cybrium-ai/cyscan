id:        CBR-SEC-GL-NUGET_CONFIG_PASSWORD
title:     "Identified a password within a Nuget config file, potentially compromising package management access"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/nuget-config-password
message: |
  Identified a password within a Nuget config file, potentially compromising package management access.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)<add key=\"(?:(?:ClearText)?Password)\"\s*value=\"(.{8,})\"\s*/>
