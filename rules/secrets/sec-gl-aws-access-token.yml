id:        CBR-SEC-GL-AWS_ACCESS_TOKEN
title:     "Identified a pattern that may indicate AWS credentials, risking unauthorized cloud resource access a"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/aws-access-token
message: |
  Identified a pattern that may indicate AWS credentials, risking unauthorized cloud resource access and data breaches on AWS platforms.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b((?:A3T[A-Z0-9]|AKIA|ASIA|ABIA|ACCA)[A-Z2-7]{16})\b
