id:        CBR-SEC-GL-HUBSPOT_API_KEY
title:     "Found a HubSpot API Token, posing a risk to CRM data integrity and unauthorized marketing operations"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/hubspot-api-key
message: |
  Found a HubSpot API Token, posing a risk to CRM data integrity and unauthorized marketing operations.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:hubspot)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12})(?:[\x60'"\s;]|\\[nr]|$)
