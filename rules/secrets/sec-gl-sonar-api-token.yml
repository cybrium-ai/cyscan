id:        CBR-SEC-GL-SONAR_API_TOKEN
title:     "Uncovered a Sonar API token, potentially compromising software vulnerability scanning and code secur"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/sonar-api-token
message: |
  Uncovered a Sonar API token, potentially compromising software vulnerability scanning and code security.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:sonar[_.-]?(login|token))(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}((?:squ_|sqp_|sqa_)?[a-z0-9=_\-]{40})(?:[\x60'"\s;]|\\[nr]|$)
