id:        CBR-SEC-GL-ALIBABA_ACCESS_KEY_ID
title:     "Detected an Alibaba Cloud AccessKey ID, posing a risk of unauthorized cloud resource access and pote"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/alibaba-access-key-id
message: |
  Detected an Alibaba Cloud AccessKey ID, posing a risk of unauthorized cloud resource access and potential data compromise.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(LTAI(?i)[a-z0-9]{20})(?:[\x60'"\s;]|\\[nr]|$)
