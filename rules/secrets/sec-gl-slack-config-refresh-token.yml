id:        CBR-SEC-GL-SLACK_CONFIG_REFRESH_TOKEN
title:     "Discovered a Slack Configuration refresh token, potentially allowing prolonged unauthorized access t"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/slack-config-refresh-token
message: |
  Discovered a Slack Configuration refresh token, potentially allowing prolonged unauthorized access to configuration settings.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)xoxe-\d-[A-Z0-9]{146}
