id:        CBR-SEC-GL-AUTHRESS_SERVICE_CLIENT_ACCESS_KEY
title:     "Uncovered a possible Authress Service Client Access Key, which may compromise access control service"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/authress-service-client-access-key
message: |
  Uncovered a possible Authress Service Client Access Key, which may compromise access control services and sensitive data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b((?:sc|ext|scauth|authress)_(?i)[a-z0-9]{5,30}\.[a-z0-9]{4,6}\.(?-i:acc)[_-][a-z0-9-]{10,32}\.[a-z0-9+/_=-]{30,120})(?:[\x60'"\s;]|\\[nr]|$)
