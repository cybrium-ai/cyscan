id:        CBR-SEC-GL-FINICITY_API_TOKEN
title:     "Detected a Finicity API token, potentially risking financial data access and unauthorized financial "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/finicity-api-token
message: |
  Detected a Finicity API token, potentially risking financial data access and unauthorized financial operations.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:finicity)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
