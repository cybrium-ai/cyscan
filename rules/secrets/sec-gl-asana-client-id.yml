id:        CBR-SEC-GL-ASANA_CLIENT_ID
title:     "Discovered a potential Asana Client ID, risking unauthorized access to Asana projects and sensitive "
severity:  medium
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/asana-client-id
message: |
  Discovered a potential Asana Client ID, risking unauthorized access to Asana projects and sensitive task information.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:asana)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([0-9]{16})(?:[\x60'"\s;]|\\[nr]|$)
