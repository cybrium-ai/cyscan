id:        CBR-SEC-GL-DISCORD_API_TOKEN
title:     "Detected a Discord API key, potentially compromising communication channels and user data privacy on"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/discord-api-token
message: |
  Detected a Discord API key, potentially compromising communication channels and user data privacy on Discord.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:discord)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-f0-9]{64})(?:[\x60'"\s;]|\\[nr]|$)
