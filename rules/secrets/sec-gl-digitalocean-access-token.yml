id:        CBR-SEC-GL-DIGITALOCEAN_ACCESS_TOKEN
title:     "Found a DigitalOcean OAuth Access Token, risking unauthorized cloud resource access and data comprom"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/digitalocean-access-token
message: |
  Found a DigitalOcean OAuth Access Token, risking unauthorized cloud resource access and data compromise.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(doo_v1_[a-f0-9]{64})(?:[\x60'"\s;]|\\[nr]|$)
