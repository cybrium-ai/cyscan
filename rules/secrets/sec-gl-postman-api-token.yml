id:        CBR-SEC-GL-POSTMAN_API_TOKEN
title:     "Uncovered a Postman API token, potentially compromising API testing and development workflows."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/postman-api-token
message: |
  Uncovered a Postman API token, potentially compromising API testing and development workflows.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(PMAK-(?i)[a-f0-9]{24}\-[a-f0-9]{34})(?:[\x60'"\s;]|\\[nr]|$)
