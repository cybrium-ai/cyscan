id:        CBR-SEC-GL-ETSY_ACCESS_TOKEN
title:     "Found an Etsy Access Token, potentially compromising Etsy shop management and customer data."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/etsy-access-token
message: |
  Found an Etsy Access Token, potentially compromising Etsy shop management and customer data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:(?-i:ETSY|[Ee]tsy))(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{24})(?:[\x60'"\s;]|\\[nr]|$)
