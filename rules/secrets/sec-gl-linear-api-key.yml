id:        CBR-SEC-GL-LINEAR_API_KEY
title:     "Detected a Linear API Token, posing a risk to project management tools and sensitive task data."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/linear-api-key
message: |
  Detected a Linear API Token, posing a risk to project management tools and sensitive task data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  lin_api_(?i)[a-z0-9]{40}
