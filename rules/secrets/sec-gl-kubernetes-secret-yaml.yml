id:        CBR-SEC-GL-KUBERNETES_SECRET_YAML
title:     "Possible Kubernetes Secret detected, posing a risk of leaking credentials/tokens from your deploymen"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/kubernetes-secret-yaml
message: |
  Possible Kubernetes Secret detected, posing a risk of leaking credentials/tokens from your deployments
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)(?:\bkind:[ \t]*["']?\bsecret\b["']?(?s:.){0,200}?\bdata:(?s:.){0,100}?\s+([\w.-]+:(?:[ \t]*(?:\||>[-+]?)\s+)?[ \t]*(?:["']?[a-z0-9+/]{10,}={0,3}["']?|\{\{[ \t\w"|$:=,.-]+}}|""|''))|\bdata:(?s:.){0,100}?\s+([\w.-]+:(?:[ \t]*(?:\||>[-+]?)\s+)?[ \t]*(?:["']?[a-z0-9+/]{10,}={0,3}["']?|\{\{[ \t\w"|$:=,.-]+}}|""|''))(?s:.){0,200}?\bkind:[ \t]*["']?\bsecret\b["']?)
