id:        CBR-SEC-GL-TWITTER_ACCESS_SECRET
title:     "Uncovered a Twitter Access Secret, potentially risking unauthorized Twitter integrations and data br"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/twitter-access-secret
message: |
  Uncovered a Twitter Access Secret, potentially risking unauthorized Twitter integrations and data breaches.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:twitter)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{45})(?:[\x60'"\s;]|\\[nr]|$)
