id:        CBR-SEC-GL-MAXMIND_LICENSE_KEY
title:     "Discovered a potential MaxMind license key."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/maxmind-license-key
message: |
  Discovered a potential MaxMind license key.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b([A-Za-z0-9]{6}_[A-Za-z0-9]{29}_mmk)(?:[\x60'"\s;]|\\[nr]|$)
