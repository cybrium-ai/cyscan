id:        CBR-SEC-GL-BEAMER_API_TOKEN
title:     "Detected a Beamer API token, potentially compromising content management and exposing sensitive noti"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/beamer-api-token
message: |
  Detected a Beamer API token, potentially compromising content management and exposing sensitive notifications and updates.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:beamer)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(b_[a-z0-9=_\-]{44})(?:[\x60'"\s;]|\\[nr]|$)
