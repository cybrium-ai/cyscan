id:        CBR-SEC-GL-README_API_TOKEN
title:     "Detected a Readme API token, risking unauthorized documentation management and content exposure."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/readme-api-token
message: |
  Detected a Readme API token, risking unauthorized documentation management and content exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(rdme_[a-z0-9]{70})(?:[\x60'"\s;]|\\[nr]|$)
