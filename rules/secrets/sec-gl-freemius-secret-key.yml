id:        CBR-SEC-GL-FREEMIUS_SECRET_KEY
title:     "Detected a Freemius secret key, potentially exposing sensitive information."
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/freemius-secret-key
message: |
  Detected a Freemius secret key, potentially exposing sensitive information.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)["']secret_key["']\s*=>\s*["'](sk_[\S]{29})["']
