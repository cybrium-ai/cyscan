id:        CBR-SEC-GL-1PASSWORD_SECRET_KEY
title:     "Uncovered a possible 1Password secret key, potentially compromising access to secrets in vaults."
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/1password-secret-key
message: |
  Uncovered a possible 1Password secret key, potentially compromising access to secrets in vaults.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \bA3-[A-Z0-9]{6}-(?:(?:[A-Z0-9]{11})|(?:[A-Z0-9]{6}-[A-Z0-9]{5}))-[A-Z0-9]{5}-[A-Z0-9]{5}-[A-Z0-9]{5}\b
