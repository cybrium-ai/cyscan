id:        CBR-SEC-GL-NOTION_API_TOKEN
title:     "Notion API token"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/notion-api-token
message: |
  Notion API token
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(ntn_[0-9]{11}[A-Za-z0-9]{32}[A-Za-z0-9]{3})(?:[\x60'"\s;]|\\[nr]|$)
