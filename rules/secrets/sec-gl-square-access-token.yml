id:        CBR-SEC-GL-SQUARE_ACCESS_TOKEN
title:     "Detected a Square Access Token, risking unauthorized payment processing and financial transaction ex"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/square-access-token
message: |
  Detected a Square Access Token, risking unauthorized payment processing and financial transaction exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b((?:EAAA|sq0atp-)[\w-]{22,60})(?:[\x60'"\s;]|\\[nr]|$)
