id:        CBR-SEC-GL-SLACK_CONFIG_ACCESS_TOKEN
title:     "Found a Slack Configuration access token, posing a risk to workspace configuration and sensitive dat"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/slack-config-access-token
message: |
  Found a Slack Configuration access token, posing a risk to workspace configuration and sensitive data access.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)xoxe.xox[bp]-\d-[A-Z0-9]{163,166}
