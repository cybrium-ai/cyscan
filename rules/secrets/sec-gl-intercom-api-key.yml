id:        CBR-SEC-GL-INTERCOM_API_KEY
title:     "Identified an Intercom API Token, which could compromise customer communication channels and data pr"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/intercom-api-key
message: |
  Identified an Intercom API Token, which could compromise customer communication channels and data privacy.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:intercom)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9=_\-]{60})(?:[\x60'"\s;]|\\[nr]|$)
