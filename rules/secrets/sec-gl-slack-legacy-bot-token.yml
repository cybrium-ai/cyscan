id:        CBR-SEC-GL-SLACK_LEGACY_BOT_TOKEN
title:     "Uncovered a Slack Legacy bot token, which could lead to compromised legacy bot operations and data e"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/slack-legacy-bot-token
message: |
  Uncovered a Slack Legacy bot token, which could lead to compromised legacy bot operations and data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  xoxb-[0-9]{8,14}-[a-zA-Z0-9]{18,26}
