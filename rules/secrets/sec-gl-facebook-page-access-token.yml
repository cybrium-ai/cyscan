id:        CBR-SEC-GL-FACEBOOK_PAGE_ACCESS_TOKEN
title:     "Discovered a Facebook Page Access Token, posing a risk of unauthorized access to Facebook accounts a"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/facebook-page-access-token
message: |
  Discovered a Facebook Page Access Token, posing a risk of unauthorized access to Facebook accounts and personal data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(EAA[MC](?i)[a-z0-9]{100,})(?:[\x60'"\s;]|\\[nr]|$)
