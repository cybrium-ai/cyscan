id:        CBR-SEC-GL-ZENDESK_SECRET_KEY
title:     "Detected a Zendesk Secret Key, risking unauthorized access to customer support services and sensitiv"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/zendesk-secret-key
message: |
  Detected a Zendesk Secret Key, risking unauthorized access to customer support services and sensitive ticketing data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:zendesk)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{40})(?:[\x60'"\s;]|\\[nr]|$)
