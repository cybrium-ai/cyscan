id:        CBR-SEC-GL-PLAID_API_TOKEN
title:     "Discovered a Plaid API Token, potentially compromising financial data aggregation and banking servic"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/plaid-api-token
message: |
  Discovered a Plaid API Token, potentially compromising financial data aggregation and banking services.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:plaid)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(access-(?:sandbox|development|production)-[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(?:[\x60'"\s;]|\\[nr]|$)
