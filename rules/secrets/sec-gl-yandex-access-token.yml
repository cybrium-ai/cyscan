id:        CBR-SEC-GL-YANDEX_ACCESS_TOKEN
title:     "Found a Yandex Access Token, posing a risk to Yandex service integrations and user data privacy."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/yandex-access-token
message: |
  Found a Yandex Access Token, posing a risk to Yandex service integrations and user data privacy.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:yandex)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(t1\.[A-Z0-9a-z_-]+[=]{0,2}\.[A-Z0-9a-z_-]{86}[=]{0,2})(?:[\x60'"\s;]|\\[nr]|$)
