id:        CBR-SEC-GL-SENDBIRD_ACCESS_ID
title:     "Discovered a Sendbird Access ID, which could compromise chat and messaging platform integrations."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/sendbird-access-id
message: |
  Discovered a Sendbird Access ID, which could compromise chat and messaging platform integrations.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:sendbird)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(?:[\x60'"\s;]|\\[nr]|$)
