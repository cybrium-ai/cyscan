id:        CBR-SEC-GL-GITLAB_PAT
title:     "Identified a GitLab Personal Access Token, risking unauthorized access to GitLab repositories and co"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gitlab-pat
message: |
  Identified a GitLab Personal Access Token, risking unauthorized access to GitLab repositories and codebase exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  glpat-[\w-]{20}
