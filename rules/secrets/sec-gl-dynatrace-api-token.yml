id:        CBR-SEC-GL-DYNATRACE_API_TOKEN
title:     "Detected a Dynatrace API token, potentially risking application performance monitoring and data expo"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/dynatrace-api-token
message: |
  Detected a Dynatrace API token, potentially risking application performance monitoring and data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  dt0c01\.(?i)[a-z0-9]{24}\.[a-z0-9]{64}
