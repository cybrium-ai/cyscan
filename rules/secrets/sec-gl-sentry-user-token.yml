id:        CBR-SEC-GL-SENTRY_USER_TOKEN
title:     "Found a Sentry.io User Token, risking unauthorized access to error tracking services and sensitive a"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/sentry-user-token
message: |
  Found a Sentry.io User Token, risking unauthorized access to error tracking services and sensitive application data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(sntryu_[a-f0-9]{64})(?:[\x60'"\s;]|\\[nr]|$)
