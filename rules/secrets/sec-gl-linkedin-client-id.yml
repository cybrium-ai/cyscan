id:        CBR-SEC-GL-LINKEDIN_CLIENT_ID
title:     "Found a LinkedIn Client ID, risking unauthorized access to LinkedIn integrations and professional da"
severity:  medium
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/linkedin-client-id
message: |
  Found a LinkedIn Client ID, risking unauthorized access to LinkedIn integrations and professional data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:linked[_-]?in)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{14})(?:[\x60'"\s;]|\\[nr]|$)
