id:        CBR-SEC-GL-ALIBABA_SECRET_KEY
title:     "Discovered a potential Alibaba Cloud Secret Key, potentially allowing unauthorized operations and da"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/alibaba-secret-key
message: |
  Discovered a potential Alibaba Cloud Secret Key, potentially allowing unauthorized operations and data access within Alibaba Cloud.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:alibaba)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{30})(?:[\x60'"\s;]|\\[nr]|$)
