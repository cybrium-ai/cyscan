id:        CBR-SEC-GL-TELEGRAM_BOT_API_TOKEN
title:     "Detected a Telegram Bot API Token, risking unauthorized bot operations and message interception on T"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/telegram-bot-api-token
message: |
  Detected a Telegram Bot API Token, risking unauthorized bot operations and message interception on Telegram.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:telegr)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([0-9]{5,16}:(?-i:A)[a-z0-9_\-]{34})(?:[\x60'"\s;]|\\[nr]|$)
