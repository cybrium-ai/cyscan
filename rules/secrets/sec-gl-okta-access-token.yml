id:        CBR-SEC-GL-OKTA_ACCESS_TOKEN
title:     "Identified an Okta Access Token, which may compromise identity management services and user authenti"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/okta-access-token
message: |
  Identified an Okta Access Token, which may compromise identity management services and user authentication data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  [\w.-]{0,50}?(?i:[\w.-]{0,50}?(?:(?-i:[Oo]kta|OKTA))(?:[ \t\w.-]{0,20})[\s'"]{0,3})(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(00[\w=\-]{40})(?:[\x60'"\s;]|\\[nr]|$)
