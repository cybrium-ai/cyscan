id:        CBR-SEC-GL-GITLAB_RUNNER_AUTHENTICATION_TOKEN_ROUTABLE
title:     "Discovered a GitLab Runner Authentication Token (Routable), posing a risk to CI/CD pipeline integrit"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gitlab-runner-authentication-token-routable
message: |
  Discovered a GitLab Runner Authentication Token (Routable), posing a risk to CI/CD pipeline integrity and unauthorized access.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \bglrt-t\d_[0-9a-zA-Z_\-]{27,300}\.[0-9a-z]{2}[0-9a-z]{7}\b
