id:        CBR-SEC-GL-LOOKER_CLIENT_ID
title:     "Found a Looker Client ID, risking unauthorized access to a Looker account and exposing sensitive dat"
severity:  medium
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/looker-client-id
message: |
  Found a Looker Client ID, risking unauthorized access to a Looker account and exposing sensitive data.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)[\w.-]{0,50}?(?:looker)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{20})(?:[\x60'"\s;]|\\[nr]|$)
