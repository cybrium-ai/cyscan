id:        CBR-SEC-GL-GRAFANA_SERVICE_ACCOUNT_TOKEN
title:     "Discovered a Grafana service account token, posing a risk of compromised monitoring services and dat"
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/grafana-service-account-token
message: |
  Discovered a Grafana service account token, posing a risk of compromised monitoring services and data integrity.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)\b(glsa_[A-Za-z0-9]{32}_[A-Fa-f0-9]{8})(?:[\x60'"\s;]|\\[nr]|$)
