id:        CBR-SEC-GL-GRAFANA_API_KEY
title:     "Identified a Grafana API key, which could compromise monitoring dashboards and sensitive data analyt"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/grafana-api-key
message: |
  Identified a Grafana API key, which could compromise monitoring dashboards and sensitive data analytics.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  (?i)\b(eyJrIjoi[A-Za-z0-9]{70,400}={0,3})(?:[\x60'"\s;]|\\[nr]|$)
