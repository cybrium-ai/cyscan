id:        CBR-SEC-GL-FINNHUB_ACCESS_TOKEN
title:     "Found a Finnhub Access Token, risking unauthorized access to financial market data and analytics."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/finnhub-access-token
message: |
  Found a Finnhub Access Token, risking unauthorized access to financial market data and analytics.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:finnhub)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{20})(?:[\x60'"\s;]|\\[nr]|$)
