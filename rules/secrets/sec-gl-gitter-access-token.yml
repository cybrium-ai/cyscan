id:        CBR-SEC-GL-GITTER_ACCESS_TOKEN
title:     "Uncovered a Gitter Access Token, which may lead to unauthorized access to chat and communication ser"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gitter-access-token
message: |
  Uncovered a Gitter Access Token, which may lead to unauthorized access to chat and communication services.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:gitter)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9_-]{40})(?:[\x60'"\s;]|\\[nr]|$)
