id:        CBR-SEC-GL-JFROG_API_KEY
title:     "Found a JFrog API Key, posing a risk of unauthorized access to software artifact repositories and bu"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/jfrog-api-key
message: |
  Found a JFrog API Key, posing a risk of unauthorized access to software artifact repositories and build pipelines.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:jfrog|artifactory|bintray|xray)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}([a-z0-9]{73})(?:[\x60'"\s;]|\\[nr]|$)
