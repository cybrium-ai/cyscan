id:        CBR-SEC-GL-MAILGUN_PRIVATE_API_TOKEN
title:     "Found a Mailgun private API token, risking unauthorized email service operations and data breaches."
severity:  critical
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/mailgun-private-api-token
message: |
  Found a Mailgun private API token, risking unauthorized email service operations and data breaches.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  (?i)[\w.-]{0,50}?(?:mailgun)(?:[ \t\w.-]{0,20})[\s'"]{0,3}(?:=|>|:{1,3}=|\|\||:|=>|\?=|,)[\x60'"\s=]{0,5}(key-[a-f0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
