id:        CBR-SEC-GL-AWS_AMAZON_BEDROCK_API_KEY_LONG_LIVED
title:     "Identified a pattern that may indicate long-lived Amazon Bedrock API keys, risking unauthorized Amaz"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/aws-amazon-bedrock-api-key-long-lived
message: |
  Identified a pattern that may indicate long-lived Amazon Bedrock API keys, risking unauthorized Amazon Bedrock usage
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(ABSK[A-Za-z0-9+/]{109,269}={0,2})(?:[\x60'"\s;]|\\[nr]|$)
