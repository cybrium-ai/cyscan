id:        CBR-SEC-GL-ADOBE_CLIENT_SECRET
title:     "Discovered a potential Adobe Client Secret, which, if exposed, could allow unauthorized Adobe servic"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/adobe-client-secret
message: |
  Discovered a potential Adobe Client Secret, which, if exposed, could allow unauthorized Adobe service access and data manipulation.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(p8e-(?i)[a-z0-9]{32})(?:[\x60'"\s;]|\\[nr]|$)
