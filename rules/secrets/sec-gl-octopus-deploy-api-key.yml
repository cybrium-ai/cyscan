id:        CBR-SEC-GL-OCTOPUS_DEPLOY_API_KEY
title:     "Discovered a potential Octopus Deploy API key, risking application deployments and operational secur"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/octopus-deploy-api-key
message: |
  Discovered a potential Octopus Deploy API key, risking application deployments and operational security.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
regex: |
  \b(API-[A-Z0-9]{26})(?:[\x60'"\s;]|\\[nr]|$)
