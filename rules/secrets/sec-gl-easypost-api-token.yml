id:        CBR-SEC-GL-EASYPOST_API_TOKEN
title:     "Identified an EasyPost API token, which could lead to unauthorized postal and shipment service acces"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/easypost-api-token
message: |
  Identified an EasyPost API token, which could lead to unauthorized postal and shipment service access and data exposure.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \bEZAK(?i)[a-z0-9]{54}\b
