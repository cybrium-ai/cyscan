id:        CBR-SEC-GL-PYPI_UPLOAD_TOKEN
title:     "Discovered a PyPI upload token, potentially compromising Python package distribution and repository "
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/pypi-upload-token
message: |
  Discovered a PyPI upload token, potentially compromising Python package distribution and repository integrity.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  pypi-AgEIcHlwaS5vcmc[\w-]{50,1000}
