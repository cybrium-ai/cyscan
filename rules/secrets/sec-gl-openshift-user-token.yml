id:        CBR-SEC-GL-OPENSHIFT_USER_TOKEN
title:     "Found an OpenShift user token, potentially compromising an OpenShift/Kubernetes cluster."
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/openshift-user-token
message: |
  Found an OpenShift user token, potentially compromising an OpenShift/Kubernetes cluster.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  \b(sha256~[\w-]{43})(?:[^\w-]|\z)
