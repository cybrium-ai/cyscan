id:        CBR-SEC-GL-GITLAB_OAUTH_APP_SECRET
title:     "Identified a GitLab OIDC Application Secret, risking access to apps using GitLab as authentication p"
severity:  high
languages: ['generic']
cwe:       ['CWE-798']
source:    gitleaks/gitlab-oauth-app-secret
message: |
  Identified a GitLab OIDC Application Secret, risking access to apps using GitLab as authentication provider.
  
  Remediation: Remove the secret, rotate it immediately, and
  store it in a secret manager or environment variable.
pattern: |
  gloas-[0-9a-zA-Z_\-]{64}
