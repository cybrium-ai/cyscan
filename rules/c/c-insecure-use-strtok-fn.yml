id:        CBR-C-INSECURE_USE_STRTOK_FN
title:     "Insecure Use Strtok Fn"
severity:  high
languages: ['c']
cwe:       ['CWE-676']
source:    semgrep/insecure-use-strtok-fn
message: |
  Avoid using 'strtok()'. This function directly modifies the first argument buffer, permanently erasing the delimiter character. Use 'strtok_r()' instead.
pattern: |
  strtok(...)
