id:        CBR-C-INFO_LEAK_ON_NON_FORMATED_STRI
title:     "Info Leak On Non Formated String"
severity:  high
languages: ['c']
cwe:       ['CWE-532']
source:    semgrep/info-leak-on-non-formated-string
message: |
