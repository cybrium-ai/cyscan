id:        CBR-ARM-HARDCODED-PASSWORD
title:     "Hardcoded password in ARM template"
severity:  critical
languages: ['json']
cwe:       ['CWE-798']
source:    trivy-cloud-native/auto
message: |
  ARM template contains a hardcoded password or secret.
  
  Remediation: Use Key Vault references or secureString parameters.
regex: |
  (?:adminPassword|password|secretValue)\s*:\s*"[^[{][^"]{8,}"
