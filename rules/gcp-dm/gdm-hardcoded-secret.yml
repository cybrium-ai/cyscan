id:        CBR-GDM-HARDCODED-SECRET
title:     "Hardcoded secret in Deployment Manager template"
severity:  critical
languages: ['yaml']
cwe:       ['CWE-798']
source:    trivy-cloud-native/auto
message: |
  GCP Deployment Manager template contains a hardcoded password or API key.
  
  Remediation: Use Secret Manager references.
regex: |
  (?:password|apiKey|secret|private_key)\s*:\s*["\'][^{][^"\']{8,}
