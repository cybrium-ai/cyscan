id:        CBR-GDM-COMPUTE-DEFAULT-SA
title:     "Compute instance using default service account"
severity:  high
languages: ['yaml']
cwe:       ['CWE-250']
source:    trivy-cloud-native/auto
message: |
  GCP Deployment Manager compute instance uses the default service account with full API access.
  
  Remediation: Create a custom service account with minimum required permissions.
regex: |
  (?:compute\.v1\.instance|google_compute_instance)[^}]*(?:default|compute@developer)
