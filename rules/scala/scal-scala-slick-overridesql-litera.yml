id:        CBR-SCAL-SCALA_SLICK_OVERRIDESQL_LITERA
title:     "Scala Slick Overridesql Literal"
severity:  critical
languages: ['scala']
cwe:       ['CWE-89']
source:    semgrep/scala-slick-overrideSql-literal
message: |
  Detected a formatted string in a SQL statement. This could lead to SQL injection if variables in the SQL statement are not properly sanitized. Avoid using non literal values in `overrideSql(...)`.
pattern: |
  $MODEL.overrideSql($QUERY,...)
