id:        CBR-PYTH-DISABLED_CERT_VALIDATION
title:     "Disabled Cert Validation"
severity:  critical
languages: ['python']
cwe:       ['CWE-295']
source:    semgrep/disabled-cert-validation
message: |
  Certificate verification has been explicitly disabled. This permits insecure connections to insecure servers. Re-enable certification validation.
pattern: |
  requests.put(..., verify=False, ...)
