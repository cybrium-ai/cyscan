id:        CBR-PYTH-LLM_API_KEY_IN_SOURCE_PYTHON
title:     "Llm Api Key In Source Python"
severity:  critical
languages: ['python']
cwe:       ['CWE-798']
source:    semgrep/llm-api-key-in-source-python
message: |
  AI/LLM API key found hardcoded in source code. Detected key prefix matches a known AI provider (OpenAI, Anthropic, Google, Hugging Face). Use environment variables or a secrets manager instead.
pattern: |
  $VAR = "$KEY"
