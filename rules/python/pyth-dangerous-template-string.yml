id:        CBR-PYTH-DANGEROUS_TEMPLATE_STRING
title:     "Dangerous Template String"
severity:  critical
languages: ['python']
cwe:       ['CWE-96']
source:    semgrep/dangerous-template-string
message: |
  Found a template created with string formatting. This is susceptible to server-side template injection and cross-site scripting attacks.
pattern: |
  $V = "...".format(...)
  ...
  flask.render_template_string($V, ...)
  
