id:        CBR-PYTH-INSECURE_URLRETRIEVE_FTP
title:     "Insecure Urlretrieve Ftp"
severity:  high
languages: ['python']
cwe:       ['CWE-319']
source:    semgrep/insecure-urlretrieve-ftp
message: |
  Detected 'urllib.urlretrieve()' using 'ftp://'. This request will not be encrypted. Use SFTP instead. urllib does not support SFTP, so consider switching to a library which supports SFTP.
pattern: |
  urllib.request.urlretrieve("=~/^[Ff][Tt][Pp]://.*/", ...)
