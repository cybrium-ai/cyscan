id:        CBR-PYTH-PYTHON37_COMPATIBILITY_LOCALE1
title:     "Python37 Compatibility Locale1"
severity:  critical
languages: ['python']
source:    semgrep/python37-compatibility-locale1
message: |
  Found usage of the 'monetary' argument in a function call of 'locale.format_string'. This is only available on Python 3.7+ and is therefore not backwards compatible. Instead, remove the 'monetary' argument.
pattern: |
  locale.format_string(monetary=$X, ...)
