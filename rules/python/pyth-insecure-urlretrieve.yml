id:        CBR-PYTH-INSECURE_URLRETRIEVE
title:     "Insecure Urlretrieve"
severity:  high
languages: ['python']
cwe:       ['CWE-319']
source:    semgrep/insecure-urlretrieve
message: |
  Detected 'urllib.urlretrieve()' using 'http://'. This request will not be encrypted. Use 'https://' instead.
pattern: |
  urllib.request.urlretrieve("=~/[Hh][Tt][Tt][Pp]://.*/", ...)
