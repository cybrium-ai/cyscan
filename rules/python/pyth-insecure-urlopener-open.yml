id:        CBR-PYTH-INSECURE_URLOPENER_OPEN
title:     "Insecure Urlopener Open"
severity:  high
languages: ['python']
cwe:       ['CWE-319']
source:    semgrep/insecure-urlopener-open
message: |
  Detected an unsecured transmission channel. 'URLopener.open(...)' is being used with 'http://'. Use 'https://' instead to secure the channel.
pattern: |
  urllib.request.URLopener(...).open("=~/[Hh][Tt][Tt][Pp]://.*/", ...)
