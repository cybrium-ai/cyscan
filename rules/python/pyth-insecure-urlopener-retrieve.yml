id:        CBR-PYTH-INSECURE_URLOPENER_RETRIEVE
title:     "Insecure Urlopener Retrieve"
severity:  high
languages: ['python']
cwe:       ['CWE-319']
source:    semgrep/insecure-urlopener-retrieve
message: |
  Detected an unsecured transmission channel. 'URLopener.retrieve(...)' is being used with 'http://'. Use 'https://' instead to secure the channel.
pattern: |
  urllib.request.URLopener(...).retrieve("=~/[Hh][Tt][Tt][Pp]://.*/", ...)
