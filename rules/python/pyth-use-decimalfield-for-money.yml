id:        CBR-PYTH-USE_DECIMALFIELD_FOR_MONEY
title:     "Use Decimalfield For Money"
severity:  critical
languages: ['python']
source:    semgrep/use-decimalfield-for-money
message: |
  Found a FloatField used for variable $F. Use DecimalField for currency fields to avoid float-rounding errors.
pattern: |
  $F = django.db.models.FloatField(...)
