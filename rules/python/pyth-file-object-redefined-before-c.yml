id:        CBR-PYTH-FILE_OBJECT_REDEFINED_BEFORE_C
title:     "File Object Redefined Before Close"
severity:  high
languages: ['python']
source:    semgrep/file-object-redefined-before-close
message: |
  Detected a file object that is redefined and never closed. This could leak file descriptors and unnecessarily consume system resources.
pattern: |
  $F = open($X, ...)
  ...
  $F = open($Y, ...)
  
