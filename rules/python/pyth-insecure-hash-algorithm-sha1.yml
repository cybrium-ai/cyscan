id:        CBR-PYTH-INSECURE_HASH_ALGORITHM_SHA1
title:     "Insecure Hash Algorithm Sha1"
severity:  high
languages: ['python']
cwe:       ['CWE-327']
source:    semgrep/insecure-hash-algorithm-sha1
message: |
  Detected SHA1 hash algorithm which is considered insecure. SHA1 is not collision resistant and is therefore not suitable as a cryptographic signature. Use SHA256 or SHA3 instead.
pattern: |
  cryptography.hazmat.primitives.hashes.$SHA(...)
fix: |
  SHA256
  
