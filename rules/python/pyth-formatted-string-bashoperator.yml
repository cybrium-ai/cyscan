id:        CBR-PYTH-FORMATTED_STRING_BASHOPERATOR
title:     "Formatted String Bashoperator"
severity:  critical
languages: ['python']
cwe:       ['CWE-78']
source:    semgrep/formatted-string-bashoperator
message: |
  Found a formatted string in BashOperator: $CMD. This could be vulnerable to injection. Be extra sure your variables are not controllable by external sources.
pattern: |
  airflow.operators.bash_operator.BashOperator(..., bash_command="..." + $CONCAT, ...)
  
