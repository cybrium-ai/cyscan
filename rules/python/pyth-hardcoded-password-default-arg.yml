id:        CBR-PYTH-HARDCODED_PASSWORD_DEFAULT_ARG
title:     "Hardcoded Password Default Argument"
severity:  high
languages: ['python']
cwe:       ['CWE-798']
source:    semgrep/hardcoded-password-default-argument
message: |
  Hardcoded password is used as a default argument to '$FUNC'. This could be dangerous if a real password is not supplied.
pattern: |
  def $FUNC(..., password="...", ...):
    ...
  
