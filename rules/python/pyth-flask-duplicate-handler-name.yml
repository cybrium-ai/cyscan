id:        CBR-PYTH-FLASK_DUPLICATE_HANDLER_NAME
title:     "Flask Duplicate Handler Name"
severity:  high
languages: ['python']
source:    semgrep/flask-duplicate-handler-name
message: |
  Looks like `$R` is a flask function handler that registered to two different routes. This will cause a runtime error
pattern: |
  @app.route("...", ...)
  def $R(...):
      ...
  ...
  @app.route("...", ...)
  def $R(...):
      ...
  
