id:        CBR-PYTH-LIST_MODIFY_WHILE_ITERATE
title:     "List Modify While Iterate"
severity:  critical
languages: ['python']
source:    semgrep/list-modify-while-iterate
message: |
  It appears that `$LIST` is a list that is being modified while in a for loop. This will likely cause a runtime error or an infinite loop.
pattern: |
  for $ELEMENT in $LIST:
    ...
    $LIST.pop(...)
  
