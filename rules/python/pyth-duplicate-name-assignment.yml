id:        CBR-PYTH-DUPLICATE_NAME_ASSIGNMENT
title:     "Duplicate Name Assignment"
severity:  critical
languages: ['python']
source:    semgrep/duplicate-name-assignment
message: |
  The name `$NAME` is used for both `$URL` and `$OTHER_URL`, which can lead to unexpected behavior when using URL reversing. Pick a unique name for each path.
pattern: |
  [..., django.urls.path('$URL', $VIEW, name='$NAME', ...), ..., django.urls.path('$OTHER_URL', $OTHER_VIEW, name='$NAME', ...), ...]
  
