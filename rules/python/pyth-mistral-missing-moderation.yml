id:        CBR-PYTH-MISTRAL_MISSING_MODERATION
title:     "Mistral Missing Moderation"
severity:  high
languages: ['python']
cwe:       ['CWE-1188']
source:    semgrep/mistral-missing-moderation
message: |
  Mistral chat completion used without content moderation. Consider using the Moderation API (client.classifiers.moderate() or client.classifiers.moderate_chat()) to check content for harmful material. See https://docs.mistral.ai/capabilities/guardrailing/
pattern: |
  $CLIENT.chat.complete(...)
