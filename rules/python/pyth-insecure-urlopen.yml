id:        CBR-PYTH-INSECURE_URLOPEN
title:     "Insecure Urlopen"
severity:  high
languages: ['python']
cwe:       ['CWE-319']
source:    semgrep/insecure-urlopen
message: |
  Detected 'urllib.urlopen()' using 'http://'. This request will not be encrypted. Use 'https://' instead.
pattern: |
  urllib.request.urlopen("=~/[Hh][Tt][Tt][Pp]://.*/", ...)
