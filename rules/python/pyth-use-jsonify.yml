id:        CBR-PYTH-USE_JSONIFY
title:     "Use Jsonify"
severity:  critical
languages: ['python']
source:    semgrep/use-jsonify
message: |
  flask.jsonify() is a Flask helper method which handles the correct  settings for returning JSON from Flask routes
pattern: |
  $JSONDUMPS
fix: |
  flask.jsonify($...VAR)
  
