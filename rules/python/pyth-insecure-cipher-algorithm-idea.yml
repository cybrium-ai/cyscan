id:        CBR-PYTH-INSECURE_CIPHER_ALGORITHM_IDEA
title:     "Insecure Cipher Algorithm Idea"
severity:  high
languages: ['python']
cwe:       ['CWE-327']
source:    semgrep/insecure-cipher-algorithm-idea
message: |
  IDEA (International Data Encryption Algorithm) is a block cipher created in 1991.  It is an optional component of the OpenPGP standard. This cipher is susceptible to attacks when using weak keys.  It is recommended that you do not use this cipher for new applications. Use a strong symmetric cipher such as EAS instead. With the `cryptography` package it is recommended to use `Fernet` which is a secure implementation of AES in CBC mode with a 128-bit key.  Alternatively, keep using the `Cipher` cl
pattern: |
  cryptography.hazmat.primitives.ciphers.algorithms.$IDEA($KEY)
fix: |
  AES
