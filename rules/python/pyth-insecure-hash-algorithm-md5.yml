id:        CBR-PYTH-INSECURE_HASH_ALGORITHM_MD5
title:     "Insecure Hash Algorithm Md5"
severity:  high
languages: ['python']
cwe:       ['CWE-327']
source:    semgrep/insecure-hash-algorithm-md5
message: |
  Detected MD5 hash algorithm which is considered insecure. MD5 is not collision resistant and is therefore not suitable as a cryptographic signature. Use SHA256 or SHA3 instead.
pattern: |
  cryptography.hazmat.primitives.hashes.$MD5()
fix: |
  SHA256
