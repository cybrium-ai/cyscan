id:        CBR-PYTH-SECURE_SET_COOKIE
title:     "Secure Set Cookie"
severity:  high
languages: ['python']
cwe:       ['CWE-614']
source:    semgrep/secure-set-cookie
message: |
  Found a Flask cookie with insecurely configured properties.  By default the secure, httponly and samesite ar configured insecurely. cookies should be handled securely by setting `secure=True`, `httponly=True`, and `samesite='Lax'` in response.set_cookie(...). If these parameters are not properly set, your cookies are not properly protected and are at risk of being stolen by an attacker. Include the `secure=True`, `httponly=True`, `samesite='Lax'` arguments or set these to be true in the Flask co
pattern: |
  $RESP.set_cookie(...)
