id:        CBR-PYTH-JWT_PYTHON_EXPOSED_CREDENTIALS
title:     "Jwt Python Exposed Credentials"
severity:  critical
languages: ['python']
cwe:       ['CWE-522']
source:    semgrep/jwt-python-exposed-credentials
message: |
  Password is exposed through JWT token payload. This is not encrypted and the password could be compromised. Do not store passwords in JWT tokens.
pattern: |
  jwt.encode({...,"password":$P,...},...)
  
