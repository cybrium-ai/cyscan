id:        CBR-PYTH-INSECURE_REQUEST_OBJECT
title:     "Insecure Request Object"
severity:  high
languages: ['python']
cwe:       ['CWE-319']
source:    semgrep/insecure-request-object
message: |
  Detected a 'urllib.request.Request()' object using an insecure transport protocol, 'http://'. This connection will not be encrypted. Use 'https://' instead.
pattern: |
  urllib.request.Request("=~/[Hh][Tt][Tt][Pp]://.*/", ...)
