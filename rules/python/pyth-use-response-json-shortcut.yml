id:        CBR-PYTH-USE_RESPONSE_JSON_SHORTCUT
title:     "Python — Requests — Best Practice — Use Response Json Shortcut"
severity:  high
languages: ['python']
source:    semgrep/python.requests.best-practice.use-response-json-shortcut
message: |
  The requests library has a convenient shortcut for reading JSON responses, which lets you stop worrying about deserializing the response yourself.
pattern: |
  json.loads($RESP.text)
fix: |
  $RESP.json()
