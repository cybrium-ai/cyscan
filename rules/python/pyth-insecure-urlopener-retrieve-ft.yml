id:        CBR-PYTH-INSECURE_URLOPENER_RETRIEVE_FT
title:     "Insecure Urlopener Retrieve Ftp"
severity:  high
languages: ['python']
cwe:       ['CWE-319']
source:    semgrep/insecure-urlopener-retrieve-ftp
message: |
  Detected an insecure transmission channel. 'URLopener.retrieve(...)' is being used with 'ftp://'. Use SFTP instead. urllib does not support SFTP, so consider using a library which supports SFTP.
pattern: |
  urllib.request.URLopener(...).retrieve("=~/[Ff][Tt][Pp]://.*/", ...)
