id:        CBR-TERR-AWS-0017
title:     "CloudWatch log groups should be encrypted using CMK"
severity:  low
languages: ['terraform']
cwe:       ['CWE-778']
source:    trivy/aws-cloudwatch-log-group-customer-key
message: |
  CloudWatch log groups are encrypted by default, however, to get the full benefit of controlling key rotation and other KMS aspects a KMS CMK should be used.
  
  Remediation: Enable CMK encryption of CloudWatch Log Groups
regex: |
  resource\s+"aws_cloudwatch_(?:log_group|metric_alarm)"
