id:        CBR-TERR-AWS-0176
title:     "RDS IAM Database Authentication Disabled"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-693']
source:    trivy/aws-rds-enable-iam-auth
message: |
  Ensure IAM Database Authentication is enabled for RDS database instances to manage database access
  
  Remediation: Modify the PostgreSQL and MySQL type RDS instances to enable IAM database authentication.
regex: |
  resource\s+"aws_(?:db_instance|rds_cluster)"
