id:        CBR-TERR-GCP-0021
title:     "Ensure that logging of long statements is disabled."
severity:  low
languages: ['terraform']
cwe:       ['CWE-778']
source:    trivy/google-sql-pg-no-min-statement-logging
message: |
  Logging of statements which could contain sensitive data is not advised, therefore this setting should preclude all statements from being logged.
  
  Remediation: Disable minimum duration statement logging completely
regex: |
  (?:logging|access_logs)\s*\{
