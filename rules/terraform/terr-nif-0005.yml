id:        CBR-TERR-NIF-0005
title:     "The instance has common private network"
severity:  low
languages: ['terraform']
cwe:       ['CWE-693']
source:    trivy/nifcloud-computing-no-common-private-instance
message: |
  When handling sensitive data between servers, please consider using a private LAN to isolate the private side network from the shared network.
  
  Remediation: Use private LAN
regex: |
  (?:private_cluster|enable_private_nodes)\s*=\s*false
