id:        CBR-TERR-AWS-0093
title:     "S3 Access block should restrict public bucket to limit access"
severity:  high
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/aws-s3-no-public-buckets
message: |
  S3 buckets should restrict public policies for the bucket. By enabling, the restrict_public_buckets, only the bucket owner and AWS Services can access if it has a public policy.
  
  Remediation: Limit the access to public buckets to only the owner or AWS Services (eg; CloudFront)
pattern: |
  (?:public_access|publicly_accessible|public)\s*=\s*true
