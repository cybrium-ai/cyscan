id:        CBR-TERR-AWS_WORKSPACES_USER_VOLUME_UNE
title:     "Aws Workspaces User Volume Unencrypted"
severity:  high
languages: ['terraform']
cwe:       ['CWE-320']
source:    semgrep/aws-workspaces-user-volume-unencrypted
message: |
  The AWS Workspace user volume is unencrypted. The AWS KMS encryption key protects user volume. To create your own, create a aws_kms_key resource or use the ARN string of a key in your account.
pattern: |
  resource "aws_workspaces_workspace" $ANYTHING {
    ...
  }
  
