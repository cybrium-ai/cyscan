id:        CBR-TERR-RESERVED_AWS_LAMBDA_ENVIRONMEN
title:     "Reserved Aws Lambda Environment Variable"
severity:  high
languages: ['terraform']
source:    semgrep/reserved-aws-lambda-environment-variable
message: |
  `terraform apply` will fail because the environment variable "$VARIABLE" is a reserved by AWS. Use another name for "$VARIABLE".
pattern: |
  $VARIABLE = ...
  
