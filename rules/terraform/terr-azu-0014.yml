id:        CBR-TERR-AZU-0014
title:     "Ensure that the expiration date is set on all keys"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-798']
source:    trivy/azure-keyvault-ensure-key-expiry
message: |
  Expiration Date is an optional Key Vault Key behavior and is not set by default.
  
  Set when the resource will be become inactive.
  
  Remediation: Set an expiration date on the vault key
