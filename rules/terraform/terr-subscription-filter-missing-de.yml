id:        CBR-TERR-SUBSCRIPTION_FILTER_MISSING_DE
title:     "Subscription Filter Missing Depends"
severity:  high
languages: ['terraform']
source:    semgrep/subscription-filter-missing-depends
message: |
  The `aws_cloudwatch_log_subscription_filter` resource "$NAME" needs a `depends_on` clause on the `aws_lambda_permission`, otherwise Terraform may try to create these out-of-order and fail.
pattern: |
  resource "aws_cloudwatch_log_subscription_filter" $NAME {
    ...
    destination_arn = aws_lambda_function.$LAMBDA_NAME.arn
  }
  
