id:        CBR-TERR-AWS_EFS_FILESYSTEM_ENCRYPTED_W
title:     "Aws Efs Filesystem Encrypted With Cmk"
severity:  high
languages: ['terraform']
cwe:       ['CWE-320']
source:    semgrep/aws-efs-filesystem-encrypted-with-cmk
message: |
  Ensure EFS filesystem is encrypted at rest using KMS CMKs. CMKs gives you control over the encryption key in terms of access and rotation.
pattern: |
  resource "aws_efs_file_system" $ANYTHING {
    ...
    encrypted  = true
    ...
  }
  
