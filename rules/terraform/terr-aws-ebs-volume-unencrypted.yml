id:        CBR-TERR-AWS_EBS_VOLUME_UNENCRYPTED
title:     "Aws Ebs Volume Unencrypted"
severity:  high
languages: ['terraform']
cwe:       ['CWE-311']
source:    semgrep/aws-ebs-volume-unencrypted
message: |
  The AWS EBS volume is unencrypted. The volume, the disk I/O and any derived snapshots could be read if compromised. Volumes should be encrypted to ensure sensitive data is stored securely.
pattern: |
  resource "aws_ebs_volume" $ANYTHING {
    ...
  }
  
