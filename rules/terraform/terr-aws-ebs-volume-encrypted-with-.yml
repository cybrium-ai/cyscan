id:        CBR-TERR-AWS_EBS_VOLUME_ENCRYPTED_WITH_
title:     "Aws Ebs Volume Encrypted With Cmk"
severity:  high
languages: ['terraform']
cwe:       ['CWE-320']
source:    semgrep/aws-ebs-volume-encrypted-with-cmk
message: |
  Ensure EBS Volume is encrypted at rest using KMS CMKs. CMKs gives you control over the encryption key in terms of access and rotation.
pattern: |
  resource "aws_ebs_volume" $ANYTHING {
    ...
    encrypted = true
    ...
  }
  
