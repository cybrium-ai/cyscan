id:        CBR-TERR-OPNSTK-0004
title:     "A security group rule allows egress traffic to multiple public addresses"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/openstack-networking-no-public-egress
message: |
  Opening up ports to the public internet is generally to be avoided. You should restrict access to IP addresses or ranges that explicitly require it where possible.
  
  Remediation: Employ more restrictive security group rules
regex: |
  (?:public_access|publicly_accessible|public)\s*=\s*true
