id:        CBR-TERR-AWS-0009
title:     "Launch configuration should not have a public IP address."
severity:  high
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/aws-ec2-no-public-ip
message: |
  You should limit the provision of public IP addresses for resources. Resources should not be exposed on the public internet, but should have access limited to consumers required for the function of your application.
  
  Remediation: Set the instance to not be publicly accessible
regex: |
  (?:public_access|publicly_accessible|public)\s*=\s*true
