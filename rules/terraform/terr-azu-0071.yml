id:        CBR-TERR-AZU-0071
title:     "App Service FTPS Enforce Disabled"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-693']
source:    trivy/azure-appservice-enforce-ftps
message: |
  Allowing plain FTP risks credentials and data being transmitted unencrypted.
  
  Remediation: Set FTPS state to 'FTPS Only' in App Service settings to prevent plaintext FTP.
pattern: |
  resource\s+"azurerm_app_service"
