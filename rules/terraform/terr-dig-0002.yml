id:        CBR-TERR-DIG-0002
title:     "The load balancer forwarding rule is using an insecure protocol as an entrypoint"
severity:  critical
languages: ['terraform']
cwe:       ['CWE-693']
source:    trivy/digitalocean-compute-enforce-https
message: |
  Plain HTTP is unencrypted and human-readable. This means that if a malicious actor was to eavesdrop on your connection, they would be able to see all of your data flowing back and forth.
  You should use HTTPS, which is HTTP over an encrypted (TLS) connection, meaning eavesdroppers cannot read your traffic.
  
  Remediation: Switch to HTTPS to benefit from TLS security features
regex: |
  resource\s+"google_compute_(?:instance|firewall|network)"
