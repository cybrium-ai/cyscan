id:        CBR-TERR-AWS_DOCUMENTDB_AUDITING_DISABL
title:     "Aws Documentdb Auditing Disabled"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-778']
source:    semgrep/aws-documentdb-auditing-disabled
message: |
  Auditing is not enabled for DocumentDB. To ensure that you are able to accurately audit the usage of your DocumentDB cluster, you should enable auditing and export logs to CloudWatch.
pattern: |
  resource "aws_docdb_cluster" $ANYTHING {
    ...
  }
  
