id:        CBR-TERR-AWS-0026
title:     "EBS volumes must be encrypted"
severity:  high
languages: ['terraform']
cwe:       ['CWE-311']
source:    trivy/aws-ec2-enable-volume-encryption
message: |
  By enabling encryption on EBS volumes you protect the volume, the disk I/O and any derived snapshots from compromise if intercepted.
  
  Remediation: Enable encryption of EBS volumes
regex: |
  encrypted\s*=\s*false
