id:        CBR-TERR-AZU-0018
title:     "At least one email address is set for threat alerts"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-693']
source:    trivy/azure-database-threat-alert-email-set
message: |
  SQL Server sends alerts for threat detection via email, if there are no email addresses set then mitigation will be delayed.
  
  Remediation: Provide at least one email address for threat alerts
regex: |
  resource\s+"azurerm_(?:mssql|postgresql|mysql)_(?:server|database)"
