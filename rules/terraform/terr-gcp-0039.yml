id:        CBR-TERR-GCP-0039
title:     "SSL policies should enforce secure versions of TLS"
severity:  critical
languages: ['terraform']
cwe:       ['CWE-326']
source:    trivy/google-compute-use-secure-tls-policy
message: |
  TLS versions prior to 1.2 are outdated and insecure. You should use 1.2 as aminimum version.
  
  Remediation: Enforce a minimum TLS version of 1.2
regex: |
  (?:minimum_tls_version|tls_version)\s*=\s*"(?:TLS1_0|TLSv1|1\.0)"
