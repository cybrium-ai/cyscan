id:        CBR-TERR-AWS-0039
title:     "EKS should have the encryption of secrets enabled"
severity:  high
languages: ['terraform']
cwe:       ['CWE-311']
source:    trivy/aws-eks-encrypt-secrets
message: |
  EKS cluster resources should have the encryption_config block set with protection of the secrets resource.
  
  Remediation: Enable encryption of EKS secrets
regex: |
  encrypted\s*=\s*false
