id:        CBR-TERR-AWS_ELASTICSEARCH_INSECURE_TLS
title:     "Aws Elasticsearch Insecure Tls Version"
severity:  high
languages: ['terraform']
cwe:       ['CWE-326']
source:    semgrep/aws-elasticsearch-insecure-tls-version
message: |
  Detected an AWS Elasticsearch domain using an insecure version of TLS. To fix this, set "tls_security_policy" equal to "Policy-Min-TLS-1-2-2019-07".
pattern: |
  resource "aws_elasticsearch_domain" $ANYTHING {
    ...
    domain_endpoint_options {
      ...
      enforce_https = true
      tls_security_policy = "Policy-Min-TLS-1-0-2019-07"
      ...
    }
    ...
  }
  
