id:        CBR-TERR-APPSERVICE_ENABLE_HTTPS_ONLY
title:     "Appservice Enable Https Only"
severity:  critical
languages: ['terraform']
cwe:       ['CWE-319']
source:    semgrep/appservice-enable-https-only
message: |
