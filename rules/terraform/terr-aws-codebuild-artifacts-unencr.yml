id:        CBR-TERR-AWS_CODEBUILD_ARTIFACTS_UNENCR
title:     "Aws Codebuild Artifacts Unencrypted"
severity:  high
languages: ['terraform']
cwe:       ['CWE-311']
source:    semgrep/aws-codebuild-artifacts-unencrypted
message: |
  The CodeBuild project artifacts are unencrypted. All artifacts produced by your CodeBuild project pipeline should be encrypted to prevent them from being read if compromised.
pattern: |
  $ARTIFACTS {
    ...
    type = "$TYPE"
    encryption_disabled = true
    ...
  }
  
