id:        CBR-TERR-AWS-0004
title:     "No unauthorized access to API Gateway methods"
severity:  low
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/aws-apigateway-no-public-access
message: |
  API Gateway methods should generally be protected by authorization or api key. OPTION verb calls can be used without authorization
  
  Remediation: Use and authorization method or require API Key
regex: |
  (?:public_access|publicly_accessible|public)\s*=\s*true
