id:        CBR-TERR-AZU-0003
title:     "App Service authentication is activated"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-693']
source:    trivy/azure-appservice-authentication-enabled
message: |
  Enabling authentication ensures that all communications in the application are authenticated. The auth_settings block needs to be filled out with the appropriate auth backend settings
  
  Remediation: Enable authentication to prevent anonymous request being accepted
pattern: |
  resource\s+"azurerm_app_service"
