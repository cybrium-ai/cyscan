id:        CBR-TERR-GCP-0053
title:     "GKE Control Plane should not be publicly accessible"
severity:  high
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/google-gke-no-public-control-plane
message: |
  The GKE control plane is exposed to the public internet by default.
  
