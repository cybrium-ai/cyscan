id:        CBR-TERR-AZU-0037
title:     "Ensure that no sensitive credentials are exposed in VM custom_data"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-798']
source:    trivy/azure-compute-no-secrets-in-custom-data
message: |
  When creating Azure Virtual Machines, custom_data is used to pass start up information into the EC2 instance. This custom_dat must not contain access key credentials.
  
  Remediation: Don't use sensitive credentials in the VM custom_data
regex: |
  resource\s+"google_compute_(?:instance|firewall|network)"
