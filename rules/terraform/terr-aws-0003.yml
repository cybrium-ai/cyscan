id:        CBR-TERR-AWS-0003
title:     "API Gateway must have X-Ray tracing enabled"
severity:  low
languages: ['terraform']
cwe:       ['CWE-693']
source:    trivy/aws-apigateway-enable-tracing
message: |
  X-Ray tracing enables end-to-end debugging and analysis of all API Gateway HTTP requests.
  
  Remediation: Enable tracing
regex: |
  resource\s+"aws_api_gateway_(?:rest_api|stage)"
