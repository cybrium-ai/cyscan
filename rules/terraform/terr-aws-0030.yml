id:        CBR-TERR-AWS-0030
title:     "ECR repository has image scans disabled."
severity:  high
languages: ['terraform']
cwe:       ['CWE-693']
source:    trivy/aws-ecr-enable-image-scans
message: |
  Repository image scans should be enabled to ensure vulnerable software can be discovered and remediated as soon as possible.
  
  Remediation: Enable ECR image scanning
regex: |
  resource\s+"aws_ecr_repository"
