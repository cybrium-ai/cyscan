id:        CBR-TERR-OPNSTK-0002
title:     "A firewall rule allows traffic from/to the public internet"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/openstack-compute-no-public-access
message: |
  Opening up ports to the public internet is generally to be avoided. You should restrict access to IP addresses or ranges that explicitly require it where possible.
  
  Remediation: Employ more restrictive firewall rules
pattern: |
  (?:public_access|publicly_accessible|public)\s*=\s*true
