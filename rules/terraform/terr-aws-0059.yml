id:        CBR-TERR-AWS-0059
title:     "IAM Password policy should have requirement for at least one number in the password."
severity:  medium
languages: ['terraform']
cwe:       ['CWE-798']
source:    trivy/aws-iam-require-numbers-in-passwords
message: |
  IAM account password policies should ensure that passwords content including at least one number.
  
  Remediation: Enforce longer, more complex passwords in the policy
regex: |
  (?:password|admin_password)\s*=\s*"[^"]*"
