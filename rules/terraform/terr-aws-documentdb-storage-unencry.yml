id:        CBR-TERR-AWS_DOCUMENTDB_STORAGE_UNENCRY
title:     "Aws Documentdb Storage Unencrypted"
severity:  high
languages: ['terraform']
cwe:       ['CWE-311']
source:    semgrep/aws-documentdb-storage-unencrypted
message: |
  The AWS DocumentDB cluster is unencrypted. The data could be read if the underlying disks are compromised. You should enable storage encryption.
