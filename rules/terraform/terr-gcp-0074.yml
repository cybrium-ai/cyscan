id:        CBR-TERR-GCP-0074
title:     "Google Compute Network Using Firewall Rule that Allows Large Port Range"
severity:  low
languages: ['terraform']
cwe:       ['CWE-200']
source:    trivy/google-compute-disable-port-range-rule
message: |
  Firewall rules allowing broad port ranges can be risky. Ensure rules are as specific as possible.
  
  Remediation: Limit firewall rules to necessary port ranges only. If a wide range is specified, consider splitting into smaller ranges or specific ports needed for your application.
regex: |
  resource\s+"google_compute_(?:instance|firewall|network)"
