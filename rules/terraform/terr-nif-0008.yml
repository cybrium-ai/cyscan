id:        CBR-TERR-NIF-0008
title:     "A database resource is marked as publicly accessible."
severity:  critical
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/nifcloud-rdb-no-public-db-access
message: |
  Database resources should not publicly available. You should limit all access to the minimum that is required for your application to function.
  
  Remediation: Set the database to not be publicly accessible
regex: |
  (?:public_access|publicly_accessible|public)\s*=\s*true
