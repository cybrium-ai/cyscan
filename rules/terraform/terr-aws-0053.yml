id:        CBR-TERR-AWS-0053
title:     "Load balancer is exposed to the internet."
severity:  high
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/aws-elb-alb-not-public
message: |
  There are many scenarios in which you would want to expose a load balancer to the wider internet, but this check exists as a warning to prevent accidental exposure of internal assets. You should ensure that this resource should be exposed publicly.
  
  Remediation: Switch to an internal load balancer or add a tfsec ignore
pattern: |
  (?:public_access|publicly_accessible|public)\s*=\s*true
