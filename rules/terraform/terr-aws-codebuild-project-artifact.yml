id:        CBR-TERR-AWS_CODEBUILD_PROJECT_ARTIFACT
title:     "Aws Codebuild Project Artifacts Unencrypted"
severity:  high
languages: ['terraform']
cwe:       ['CWE-320']
source:    semgrep/aws-codebuild-project-artifacts-unencrypted
message: |
  The AWS CodeBuild Project Artifacts are unencrypted. The AWS KMS encryption key protects artifacts in the CodeBuild Projects. To create your own, create a aws_kms_key resource or use the ARN string of a key in your account.
pattern: |
  resource "aws_codebuild_project" $ANYTHING {
    ...
    artifacts {
      ...
      encryption_disabled = true
      ...
    }
    ...
  }
  
