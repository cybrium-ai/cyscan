id:        CBR-TERR-AWS-0063
title:     "IAM Password policy should have minimum password length of 14 or more characters."
severity:  medium
languages: ['terraform']
cwe:       ['CWE-798']
source:    trivy/aws-iam-set-minimum-password-length
message: |
  IAM account password policies should ensure that passwords have a minimum length.
  
  The account password policy should be set to enforce minimum password length of at least 14 characters.
  
  Remediation: Enforce longer, more complex passwords in the policy
regex: |
  (?:password|admin_password)\s*=\s*"[^"]*"
