id:        CBR-TERR-AWS-0113
title:     "SAM API stages for V1 and V2 should have access logging enabled"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/aws-sam-enable-api-access-logging
message: |
  API Gateway stages should have access log settings block configured to track all access to a particular stage. This should be applied to both v1 and v2 gateway stages.
  
  Remediation: Enable logging for API Gateway stages
regex: |
  (?:logging|access_logs)\s*\{
