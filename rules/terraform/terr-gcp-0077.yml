id:        CBR-TERR-GCP-0077
title:     "Cloud Storage Bucket Logging Not Enabled"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-778']
source:    trivy/google-storage-enable-bucket-logging
message: |
  Cloud Storage bucket access logs should be enabled for audit purposes.
  
  Remediation: Enable Access and Storage logs for Cloud Storage buckets by configuring a log sink or specifying a `log_bucket` in Terraform.
pattern: |
  (?:logging|access_logs)\s*\{
