id:        CBR-TERR-GCP-0001
title:     "Ensure that Cloud Storage bucket is not anonymously or publicly accessible."
severity:  high
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/google-storage-no-public-access
message: |
  Using 'allUsers' or 'allAuthenticatedUsers' as members in an IAM member/binding causes data to be exposed outside of the organisation.
  
  Remediation: Restrict public access to the bucket.
regex: |
  (?:public_access|publicly_accessible|public)\s*=\s*true
