id:        CBR-TERR-AZU-0074
title:     "Sensitive Port Is Exposed To Entire Network"
severity:  high
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/azure-network-sensitive-port-is-exposed-to-entire-network
message: |
  Sensitive legacy ports like Telnet or POP3 should not be open to broad networks.
  
  Remediation: Remove NSG rules allowing legacy or unencrypted protocols on broad scopes.
regex: |
  resource\s+"azurerm_(?:network_security_group|virtual_network)"
