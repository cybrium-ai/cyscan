id:        CBR-TERR-LAMBDA_PERMISSION_LOGS_MISSING
title:     "Lambda Permission Logs Missing Arn Asterisk"
severity:  high
languages: ['terraform']
source:    semgrep/lambda-permission-logs-missing-arn-asterisk
message: |
  The `source_arn` field needs to end with an asterisk, like this: `<log-group-arn>:*` Without this, the `aws_lambda_permission` resource '$NAME' will not be created. Add the asterisk to the end of the arn. x $ARN
pattern: |
  source_arn = $ARN
  
