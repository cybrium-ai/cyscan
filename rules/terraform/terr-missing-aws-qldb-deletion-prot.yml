id:        CBR-TERR-MISSING_AWS_QLDB_DELETION_PROT
title:     "Missing Aws Qldb Deletion Protection"
severity:  high
languages: ['terraform']
source:    semgrep/missing-aws-qldb-deletion-protection
message: |
  The AWS QLDB deletion protection is not enabled.
pattern: |
  resource "aws_qldb_ledger" $ANYTHING {
    ...
    deletion_protection = false
    ...
  }
  
