id:        CBR-TERR-AWS_S3_BUCKET_VERSIONING_NOT_E
title:     "Aws S3 Bucket Versioning Not Enabled"
severity:  high
languages: ['terraform']
source:    semgrep/aws-s3-bucket-versioning-not-enabled
message: |
  Ensure that Amazon S3 bucket versioning is not enabled. Consider using versioning if you don't have alternative backup mechanism.
pattern: |
  resource "aws_s3_bucket" $ANYTHING {
    ...
  }
  
