id:        CBR-TERR-GCP-0037
title:     "The encryption key used to encrypt a compute disk has been specified in plaintext."
severity:  critical
languages: ['terraform']
cwe:       ['CWE-311']
source:    trivy/google-compute-disk-encryption-no-plaintext-key
message: |
  Sensitive values such as raw encryption keys should not be included in your Terraform code, and should be stored securely by a secrets manager.
  
  Remediation: Reference a managed key rather than include the key in raw format.
regex: |
  encrypted\s*=\s*false
