id:        CBR-TERR-AWS-0060
title:     "IAM Password policy should have requirement for at least one symbol in the password."
severity:  medium
languages: ['terraform']
cwe:       ['CWE-798']
source:    trivy/aws-iam-require-symbols-in-passwords
message: |
  IAM account password policies should ensure that passwords content including a symbol.
  
  Remediation: Enforce longer, more complex passwords in the policy
pattern: |
  (?:password|admin_password)\s*=\s*"[^"]*"
