id:        CBR-TERR-AZU-0022
title:     "Ensure databases are not publicly accessible"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/azure-database-no-public-access
message: |
  Database resources should not publicly available. You should limit all access to the minimum that is required for your application to function.
  
  Remediation: Disable public access to database when not required
regex: |
  (?:public_access|publicly_accessible|public)\s*=\s*true
