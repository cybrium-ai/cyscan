id:        CBR-TERR-AWS_INSECURE_CLOUDFRONT_DISTRI
title:     "Aws Insecure Cloudfront Distribution Tls Version"
severity:  high
languages: ['terraform']
cwe:       ['CWE-326']
source:    semgrep/aws-insecure-cloudfront-distribution-tls-version
message: |
  Detected an AWS CloudFront Distribution with an insecure TLS version. TLS versions less than 1.2 are considered insecure because they can be broken. To fix this, set your `minimum_protocol_version` to `"TLSv1.2_2018", "TLSv1.2_2019", "TLSv1.2_2021", "TLSv1.2_2025" or "TLSv1.3_2025"`.
pattern: |
  resource "aws_cloudfront_distribution" $ANYTHING {
    ...
    viewer_certificate {
      ...
    }
    ...
  }
  
