id:        CBR-TERR-APPSERVICE_USE_SECURE_TLS_POLI
title:     "Appservice Use Secure Tls Policy"
severity:  critical
languages: ['terraform']
cwe:       ['CWE-326']
source:    semgrep/appservice-use-secure-tls-policy
message: |
  Detected an AppService that was not configured to use TLS 1.2. Add `site_config.min_tls_version = "1.2"` in your resource block.
pattern: |
  min_tls_version = $ANYTHING
