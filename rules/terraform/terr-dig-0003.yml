id:        CBR-TERR-DIG-0003
title:     "A firewall rule should not allow unrestricted egress to any IP address."
severity:  critical
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/digitalocean-compute-no-public-egress
message: |
  Opening up ports to connect out to the public internet is generally to be avoided. You should restrict access to IP addresses or ranges that are explicitly required where possible.
  
  Remediation: Set a more restrictive cidr range
regex: |
  (?:public_access|publicly_accessible|public)\s*=\s*true
