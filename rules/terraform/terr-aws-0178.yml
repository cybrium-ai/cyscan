id:        CBR-TERR-AWS-0178
title:     "VPC Flow Logs should be enabled for packet rejects"
severity:  medium
languages: ['terraform']
cwe:       ['CWE-778']
source:    trivy/aws-ec2-require-vpc-flow-logs-for-all-vpcs
message: |
  VPC Flow Logs provide visibility into network traffic that traverses the VPC and can be used to detect anomalous traffic or insight during security workflows.
  
  Remediation: Enable flow logs for VPC
pattern: |
  flow_log
