id:        CBR-TERR-GCP-0075
title:     "Google Compute Subnetwork with Private Google Access Disabled"
severity:  low
languages: ['terraform']
cwe:       ['CWE-284']
source:    trivy/google-compute-enable-subnetwork-private-google-access
message: |
  Private Google Access allows instances in a subnet to reach Google APIs and services via internal IP, which should be enabled for private networks.
  
  Remediation: Enable Private Google Access on subnets. In Terraform, set `private_ip_google_access = true` in the `google_compute_subnetwork` resource.
regex: |
  (?:private_cluster|enable_private_nodes)\s*=\s*false
