id:        CBR-BASH-ITERATION_OVER_LS_OUTPUT
title:     "Iteration Over Ls Output"
severity:  high
languages: ['bash']
source:    semgrep/iteration-over-ls-output
message: |
  Iterating over ls output is fragile. Use globs, e.g. 'dir/*' instead of '$(ls dir)'.
pattern: |
  for $VAR in $LIST; do
    ...
  done
  
