id:        CBR-DOCK-SECRETS-IN-ENV
title:     "Secrets hardcoded in ENV/ARG"
severity:  critical
languages: ['docker']
cwe:       ['CWE-798']
source:    trivy/docker-leaked-secrets
message: |
  Secrets appear to be hardcoded in ENV or ARG instructions. These values are visible in image metadata and layer history.
  
  Remediation: Use Docker BuildKit secrets (--mount=type=secret) or runtime environment variables.
pattern: |
  ^\s*(?:ENV|ARG)\s+\w*(?:PASSWORD|SECRET|TOKEN|KEY|APIKEY|API_KEY|PRIVATE_KEY|CREDENTIAL)\w*\s*=\s*\S+
