id:        CBR-DOCK-UPDATE-ALONE
title:     "Package update without install in same RUN"
severity:  low
languages: ['docker']
cwe:       ['CWE-459']
source:    trivy/docker-update-instruction-alone
message: |
  apt-get update or apk update is in a separate RUN instruction from install. This creates a cached layer that may serve stale package lists.
  
  Remediation: Combine update and install in the same RUN instruction.
regex: |
  ^\s*RUN\s+(?:apt-get|apk)\s+update\s*$
