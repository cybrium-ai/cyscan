id:        CBR-DOCK-AVOID_APT_GET_UPGRADE
title:     "Avoid Apt Get Upgrade"
severity:  high
languages: ['docker']
source:    semgrep/avoid-apt-get-upgrade
message: |
  Packages in base containers should be up-to-date, removing the need to upgrade or dist-upgrade. If a package is out of date, contact the maintainers.
pattern: |
  RUN ... apt-get upgrade ...
