id:        CBR-DOCK-MISSING_YUM_ASSUME_YES_SWITCH
title:     "Missing Yum Assume Yes Switch"
severity:  high
languages: ['docker']
source:    semgrep/missing-yum-assume-yes-switch
message: |
  This 'yum install' is missing the '-y' switch. This might stall builds because it requires human intervention. Add the '-y' switch.
pattern: |
  RUN ... yum install ...
  
