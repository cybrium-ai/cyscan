id:        CBR-DOCK-MISSING_DNF_ASSUME_YES_SWITCH
title:     "Missing Dnf Assume Yes Switch"
severity:  high
languages: ['docker']
source:    semgrep/missing-dnf-assume-yes-switch
message: |
  This 'dnf install' is missing the '-y' switch. This might stall builds because it requires human intervention. Add the '-y' switch.
pattern: |
  RUN ... dnf install ...
  
