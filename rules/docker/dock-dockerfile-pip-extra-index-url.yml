id:        CBR-DOCK-DOCKERFILE_PIP_EXTRA_INDEX_URL
title:     "Dockerfile Pip Extra Index Url"
severity:  medium
languages: ['docker']
cwe:       ['CWE-427']
source:    semgrep/dockerfile-pip-extra-index-url
message: |
  When `--extra-index-url` is used in a `pip install` command, this is usually meant to  install a package from a package index other than the public one.  However, if a package is added with the same name to the public PyPi repository, and if the version number is high enough, this package will be installed when building this docker image. This package may be a malicious dependency. Such an attack is called a dependency confusion attack. If using a private package index, prefer to use `--index-ur
pattern: |
  RUN ... $PIP install ... --extra-index-url ...
  
