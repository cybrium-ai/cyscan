id:        CBR-DOCK-LATEST-TAG
title:     "Base image uses latest tag"
severity:  medium
languages: ['docker']
cwe:       ['CWE-829']
source:    trivy/docker-latest-tag
message: |
  Base image uses :latest tag, making builds non-reproducible. Image contents can change unexpectedly.
  
  Remediation: Pin base image to a specific version (e.g. python:3.12-slim-bookworm).
pattern: |
  ^\s*FROM\s+\S+:latest\b
