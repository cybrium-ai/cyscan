id:        CBR-DOCK-USE_EITHER_WGET_OR_CURL
title:     "Use Either Wget Or Curl"
severity:  medium
languages: ['docker']
source:    semgrep/use-either-wget-or-curl
message: |
  'wget' and 'curl' are similar tools. Choose one and do not install the other to decrease image size.
pattern: |
  RUN wget ...
  ...
  RUN curl ...
  
