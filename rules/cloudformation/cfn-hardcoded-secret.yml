id:        CBR-CFN-HARDCODED-SECRET
title:     "Hardcoded secret in CloudFormation template"
severity:  critical
languages: ['json']
cwe:       ['CWE-798']
source:    trivy-cloud-native/auto
message: |
  CloudFormation template contains a hardcoded password or secret value.
  
  Remediation: Use AWS Secrets Manager or SSM Parameter Store with NoEcho parameters.
pattern: |
  (?:Password|Secret|ApiKey|AccessKey)\s*:\s*["\'][^!{][^"\']{8,}
