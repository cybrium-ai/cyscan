id:        CBR-JS-NODE_COMMAND_INJECTION
title:     "Node.js Command Injection"
severity:  critical
languages: ['javascript', 'typescript']
cwe:       ['CWE-78']
message: |
  Detected `child_process.exec` or similar with non-literal input. This can lead to command injection if user input is not properly sanitized. Use `child_process.execFile` or `child_process.spawn` instead, as they accept an argument list and do not spawn a shell by default.
query: |
  (invocation_expression
    function: (member_expression
      expression: (identifier) @pkg (#match? @pkg "^(child_process|cp)$")
      property: (property_identifier) @method (#match? @method "^(exec|spawn|execSync|spawnSync)$"))
    arguments: (arguments
      (_) @cmd (#not-kind? @cmd "string")))
