id:        CBR-JAVA-UNKNOWN_VALUE_IN_REDIRECT
title:     "Unknown Value In Redirect"
severity:  high
languages: ['javascript', 'typescript']
cwe:       ['CWE-601']
source:    semgrep/unknown-value-in-redirect
message: |
  It looks like '$UNK' is read from user input and it is used to as a redirect. Ensure '$UNK' is not externally controlled, otherwise this is an open redirect.
pattern: |
  $RES.redirect(..., <... $UNK ...>, ...)
