id:        CBR-JAVA-COHERE_MISSING_SAFETY_MODE_JAV
title:     "Cohere Missing Safety Mode Javascript"
severity:  high
languages: ['javascript', 'typescript']
cwe:       ['CWE-1188']
source:    semgrep/cohere-missing-safety-mode-javascript
message: |
  Cohere chat called without explicit 'safety_mode' parameter. Set safetyMode to 'STRICT' or 'CONTEXTUAL' to explicitly configure content safety guardrails. See https://docs.cohere.com/docs/safety-modes
pattern: |
  $CLIENT.chat({...})
