id:        CBR-JAVA-COHERE_SAFETY_MODE_OFF_JAVASCR
title:     "Cohere Safety Mode Off Javascript"
severity:  critical
languages: ['javascript', 'typescript']
cwe:       ['CWE-1188']
source:    semgrep/cohere-safety-mode-off-javascript
message: |
  Cohere safety mode explicitly set to 'OFF', disabling all safety guardrails. Use 'STRICT' or 'CONTEXTUAL' instead. See https://docs.cohere.com/docs/safety-modes
pattern: |
  $CLIENT.chat({..., safetyMode: "OFF", ...})
  
