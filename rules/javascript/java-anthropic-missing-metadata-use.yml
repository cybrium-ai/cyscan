id:        CBR-JAVA-ANTHROPIC_MISSING_METADATA_USE
title:     "Anthropic Missing Metadata User Id Javascript"
severity:  high
languages: ['javascript', 'typescript']
cwe:       ['CWE-778']
source:    semgrep/anthropic-missing-metadata-user-id-javascript
message: |
  Anthropic messages.create() called without 'metadata' parameter. Pass a metadata object with a hashed user_id to enable abuse tracking and policy enforcement. See https://docs.anthropic.com/en/api/messages
pattern: |
  $CLIENT.messages.create({...})
