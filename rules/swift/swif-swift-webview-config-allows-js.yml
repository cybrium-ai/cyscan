id:        CBR-SWIF-SWIFT_WEBVIEW_CONFIG_ALLOWS_JS
title:     "Swift Webview Config Allows Js Open Windows"
severity:  high
languages: ['swift']
cwe:       ['CWE-272']
source:    semgrep/swift-webview-config-allows-js-open-windows
message: |
  Webviews were observed that explictly allow JavaScript in an WKWebview to open windows automatically. Consider disabling this functionality if not required, following the principle of least privelege.
pattern: |
  $P = WKPreferences()
  ...
  
