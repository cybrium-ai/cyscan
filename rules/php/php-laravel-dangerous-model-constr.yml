id:        CBR-PHP-LARAVEL_DANGEROUS_MODEL_CONSTR
title:     "Laravel Dangerous Model Construction"
severity:  critical
languages: ['php']
cwe:       ['CWE-915']
source:    semgrep/laravel-dangerous-model-construction
message: |
  Setting `$guarded` to an empty array allows mass assignment to every property in a Laravel model. This explicitly overrides Eloquent's safe-by-default mass assignment protections.
pattern: |
  $guarded = [];
  
