id:        CBR-JAVA-USE_OF_WEAK_RSA_KEY
title:     "Use Of Weak Rsa Key"
severity:  high
languages: ['java']
cwe:       ['CWE-326']
source:    semgrep/use-of-weak-rsa-key
message: |
  RSA keys should be at least 2048 bits based on NIST recommendation.
pattern: |
  KeyPairGenerator $KEY = $G.getInstance("RSA");
  ...
  $KEY.initialize($BITS);
  
