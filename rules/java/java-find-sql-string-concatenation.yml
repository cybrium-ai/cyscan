id:        CBR-JAVA-FIND_SQL_STRING_CONCATENATION
title:     "Find Sql String Concatenation"
severity:  critical
languages: ['java']
cwe:       ['CWE-89']
source:    semgrep/find-sql-string-concatenation
message: |
  In $METHOD, $X is used to construct a SQL query via string concatenation.
pattern: |
  $RETURN $METHOD(...,String $X,...){
    ...
    Session $SESSION = ...;
    ...
    String $QUERY = ... + $X + ...;
    ...
    PreparedStatement $PS = $SESSION.connection().prepareStatement($QUERY);
    ...
    ResultSet $RESULT = $PS.executeQuery();
    ...
  }
  
