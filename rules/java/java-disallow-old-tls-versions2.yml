id:        CBR-JAVA-DISALLOW_OLD_TLS_VERSIONS2
title:     "Disallow Old Tls Versions2"
severity:  high
languages: ['java']
cwe:       ['CWE-319']
source:    semgrep/disallow-old-tls-versions2
message: |
  Detects setting client protocols to insecure versions of TLS and SSL. These protocols are deprecated due to POODLE, man in the middle attacks, and other vulnerabilities.
pattern: |
  $VALUE. ... .setProperty("jdk.tls.client.protocols", "$PATTERNS");
