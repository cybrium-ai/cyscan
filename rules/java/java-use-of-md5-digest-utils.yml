id:        CBR-JAVA-USE_OF_MD5_DIGEST_UTILS
title:     "Use Of Md5 Digest Utils"
severity:  high
languages: ['java']
cwe:       ['CWE-328']
source:    semgrep/use-of-md5-digest-utils
message: |
  Detected MD5 hash algorithm which is considered insecure. MD5 is not collision resistant and is therefore not suitable as a cryptographic signature. Use HMAC instead.
pattern: |
  $DU.$GET_ALGO().digest(...)
  
fix: |
  getSha512Digest
  
