id:        CBR-JAVA-BLOWFISH_INSUFFICIENT_KEY_SIZE
title:     "Blowfish Insufficient Key Size"
severity:  high
languages: ['java']
cwe:       ['CWE-326']
source:    semgrep/blowfish-insufficient-key-size
message: |
  Using less than 128 bits for Blowfish is considered insecure. Use 128 bits or more, or switch to use AES instead.
pattern: |
  $KEYGEN = KeyGenerator.getInstance("Blowfish");
  ...
  $KEYGEN.init($SIZE);
  
