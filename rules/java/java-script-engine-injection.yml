id:        CBR-JAVA-SCRIPT_ENGINE_INJECTION
title:     "Script Engine Injection"
severity:  high
languages: ['java']
cwe:       ['CWE-94']
source:    semgrep/script-engine-injection
message: |
  Detected potential code injection using ScriptEngine. Ensure user-controlled data cannot enter '.eval()', otherwise, this is a code injection vulnerability.
pattern: |
  $X $METHOD(...) {
    ...
    $SE.eval(...);
    ...
  }
  
