id:        CBR-JAVA-DETECT_NO_CSRF_BEFORE_METHOD_O
title:     "Detect No Csrf Before Method Override"
severity:  high
languages: ['javascript', 'typescript']
cwe:       ['CWE-352']
source:    semgrep/detect-no-csrf-before-method-override
message: |
  Detected use of express.csrf() middleware before express.methodOverride(). This can allow GET requests (which are not checked by csrf) to turn into POST requests later.
pattern: |
  express.csrf();
  ...
  express.methodOverride();
  
