id:        CBR-JAVA-DETECT_DISABLE_MUSTACHE_ESCAPE
title:     "Detect Disable Mustache Escape"
severity:  high
languages: ['javascript', 'typescript']
cwe:       ['CWE-116']
source:    semgrep/detect-disable-mustache-escape
message: |
  Markup escaping disabled. This can be used with some template engines to escape disabling of HTML entities, which can lead to XSS attacks.
pattern: |
  $OBJ.escapeMarkup = false
