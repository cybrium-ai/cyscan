id:        CBR-JAVA-OPENAI_MISSING_MAX_TOKENS_JAVA
title:     "Openai Missing Max Tokens Javascript"
severity:  high
languages: ['javascript', 'typescript']
cwe:       ['CWE-1188']
source:    semgrep/openai-missing-max-tokens-javascript
message: |
  OpenAI chat completion created without 'max_tokens' parameter. Setting max_tokens prevents unexpectedly long or expensive responses and limits potential abuse. See https://developers.openai.com/api/docs/guides/safety-best-practices
pattern: |
  $CLIENT.chat.completions.create({...})
