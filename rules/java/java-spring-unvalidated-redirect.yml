id:        CBR-JAVA-SPRING_UNVALIDATED_REDIRECT
title:     "Spring Unvalidated Redirect"
severity:  high
languages: ['java']
cwe:       ['CWE-601']
source:    semgrep/spring-unvalidated-redirect
message: |
  Application redirects a user to a destination URL specified by a user supplied parameter that is not validated.
