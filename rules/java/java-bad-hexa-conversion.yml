id:        CBR-JAVA-BAD_HEXA_CONVERSION
title:     "Bad Hexa Conversion"
severity:  high
languages: ['java']
cwe:       ['CWE-704']
source:    semgrep/bad-hexa-conversion
message: |
  'Integer.toHexString()' strips leading zeroes from each byte if read byte-by-byte. This mistake weakens the hash value computed since it introduces more collisions. Use 'String.format("%02X", ...)' instead.
pattern: |
  $X $METHOD(...) {
    ...
    MessageDigest $MD = ...;
    ...
    $MD.digest(...);
    ...
    Integer.toHexString(...);
  }
