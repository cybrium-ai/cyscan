id:        CBR-JAVA-HTTPURLCONNECTION_HTTP_REQUEST
title:     "Httpurlconnection Http Request"
severity:  high
languages: ['java']
cwe:       ['CWE-319']
source:    semgrep/httpurlconnection-http-request
message: |
  Detected an HTTP request sent via HttpURLConnection. This could lead to sensitive information being sent over an insecure channel. Instead, it is recommended to send requests over HTTPS.
pattern: |
  "=~/[Hh][Tt][Tt][Pp]://.*/"
  
