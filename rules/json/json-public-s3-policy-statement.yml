id:        CBR-JSON-PUBLIC_S3_POLICY_STATEMENT
title:     "Public S3 Policy Statement"
severity:  high
languages: ['json']
cwe:       ['CWE-264']
source:    semgrep/public-s3-policy-statement
message: |
  Detected public S3 bucket policy. This policy allows anyone to access certain properties of or items in the bucket. Do not do this unless you will never have sensitive data inside the bucket.
pattern: |
  {
    "Effect": "Allow",
    "Principal": "*",
    "Resource": [
      ..., "=~/arn:aws:s3.*/", ...
    ],
    ...
  }
  
