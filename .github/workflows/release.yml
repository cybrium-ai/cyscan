# Build cyscan for every supported target and publish binaries + a
# Homebrew formula on tag push.
#
# Drop this file at `.github/workflows/release.yml` inside the
# `cybrium-ai/cyscan` repo (root-layout — Cargo.toml is at the root).
#
# Trigger:
#   git tag v0.1.0       # note: NO "cyscan-" prefix in the standalone repo
#   git push origin v0.1.0
#
# Required repo secrets on cybrium-ai/cyscan:
#   HOMEBREW_TAP_TOKEN  — fine-grained PAT with Contents:write on
#                          cybrium-ai/homebrew-cli (same tap the
#                          `cybrium` CLI uses; adds a second formula).

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Version to release (without the v prefix)"
        required: true

permissions:
  contents:   write
  id-token:   write   # Cosign keyless signing — GitHub OIDC identifies the workflow

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-apple-darwin,       os: macos-latest }
          - { target: aarch64-apple-darwin,      os: macos-latest }
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-pc-windows-msvc,    os: windows-latest }

    steps:
      # Plain checkout — no LFS. Advisory JSONL files used to live in
      # LFS (npm.jsonl was 185 MB), but they compress 8–12× as gzip and
      # now ship as `*.jsonl.gz` in regular git (advisory loader does
      # the decompression at startup). LFS is gone from this repo.
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile tooling (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Cargo build
        run: cargo build --release --target ${{ matrix.target }}

      # ── macOS: import Developer ID Application cert into an ephemeral
      #            keychain. Codesign + notarize+staple in the next step.
      - name: Import Apple cert (macOS)
        if: ${{ startsWith(matrix.os, 'macos') && env.CERT != '' }}
        env:
          CERT:         ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          CERT_PWD:     ${{ secrets.APPLE_DEVELOPER_ID_CERT_PWD }}
          KEYCHAIN_PWD: ${{ secrets.APPLE_KEYCHAIN_PWD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          echo -n "$CERT" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$CERT_PWD" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

      - name: Codesign + notarize (macOS)
        if: ${{ startsWith(matrix.os, 'macos') && env.CERT != '' }}
        env:
          CERT:               ${{ secrets.APPLE_DEVELOPER_ID_CERT }}
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          BIN="target/${{ matrix.target }}/release/cyscan"
          IDENT=$(security find-identity -v -p codesigning $RUNNER_TEMP/build.keychain-db | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          codesign --force --options runtime --timestamp --sign "$IDENT" "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"
          # notarytool requires a zip (or a signed pkg/dmg) for plain Mach-O
          (cd target/${{ matrix.target }}/release && zip -q cyscan-notarize.zip cyscan)
          xcrun notarytool submit target/${{ matrix.target }}/release/cyscan-notarize.zip \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          # Plain Mach-O binaries can't be stapled — notarisation acceptance is
          # cached by Gatekeeper from the ticket Apple posts back. Skip stapler.

      # ── Windows: Azure Trusted Signing (federated OIDC, no client secret).
      # Cert profile 'cybrium' on cybrium-signing account (centralus). FIC
      # subject is repo:cybrium-ai/cyscan:ref_type:tag — only tag pushes
      # can mint a signing token. azure/login MUST run before the
      # trusted-signing-action so DefaultAzureCredential finds the OIDC token.
      - name: Azure login (federated OIDC)
        if: matrix.target == 'x86_64-pc-windows-msvc' && startsWith(github.ref, 'refs/tags/v')
        uses: azure/login@v2
        with:
          client-id:              ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:              ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Sign Windows binary via Azure Trusted Signing
        if: matrix.target == 'x86_64-pc-windows-msvc' && startsWith(github.ref, 'refs/tags/v')
        uses: Azure/trusted-signing-action@v0.5
        with:
          azure-tenant-id:              ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:              ${{ secrets.AZURE_CLIENT_ID }}
          endpoint:                     https://cus.codesigning.azure.net/
          trusted-signing-account-name: cybrium-signing
          certificate-profile-name:     cybrium
          files-folder:                 target/${{ matrix.target }}/release
          files-folder-filter:          exe
          file-digest:                  SHA256
          timestamp-rfc3161:            http://timestamp.acs.microsoft.com
          timestamp-digest:             SHA256

      - name: Verify Windows signature
        if: matrix.target == 'x86_64-pc-windows-msvc' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\cyscan.exe"
          $sig = Get-AuthenticodeSignature $bin
          Write-Host "Signature status: $($sig.Status)"
          Write-Host "Signer: $($sig.SignerCertificate.Subject)"
          if ($sig.Status -ne 'Valid') { throw "Signature verification failed: $($sig.Status)" }

      - name: Package archive
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.tag }}"
          TARGET="${{ matrix.target }}"
          STAGE="dist/cyscan_${VERSION}_${TARGET}"
          mkdir -p "$STAGE"

          if [[ "$TARGET" == *"windows"* ]]; then
            cp "target/${TARGET}/release/cyscan.exe" "$STAGE/"
          else
            cp "target/${TARGET}/release/cyscan" "$STAGE/"
          fi

          # Ship the bundled rule pack alongside the binary so the
          # default scan works out of the box.
          cp -r rules     "$STAGE/rules"
          cp    README.md "$STAGE/"
          cp    LICENSE 2>/dev/null || true

          cd dist
          if [[ "$TARGET" == *"windows"* ]]; then
            7z a "cyscan_${VERSION}_${TARGET}.zip" "cyscan_${VERSION}_${TARGET}/"
          else
            tar -czf "cyscan_${VERSION}_${TARGET}.tar.gz" "cyscan_${VERSION}_${TARGET}/"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: cyscan-${{ matrix.target }}
          path: dist/cyscan_${{ steps.ver.outputs.tag }}_${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Publish GitHub Release + Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      # No LFS needed here — every required asset is already packaged
      # into the matrix's tarballs by the build step above.
      - uses: actions/checkout@v5

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute checksums
        id: sums
        run: |
          cd artifacts
          sha256sum cyscan_* > SHA256SUMS
          cat SHA256SUMS
          {
            echo "darwin_arm64_sha=$(awk '/aarch64-apple-darwin/ {print $1}' SHA256SUMS)"
            echo "darwin_amd64_sha=$(awk '/x86_64-apple-darwin/  {print $1}' SHA256SUMS)"
            echo "linux_arm64_sha=$(awk  '/aarch64-unknown-linux-gnu/ {print $1}' SHA256SUMS)"
            echo "linux_amd64_sha=$(awk  '/x86_64-unknown-linux-gnu/  {print $1}' SHA256SUMS)"
          } >> "$GITHUB_OUTPUT"

      # Sign every release artefact with Cosign's keyless mode. The
      # GitHub OIDC token identifies the workflow run; no long-lived
      # signing key is ever stored anywhere. Verifiers check the
      # ephemeral certificate chain + Rekor transparency log.
      #
      # Users verify a downloaded binary with:
      #
      #   cosign verify-blob \
      #     --certificate-identity-regexp '^https://github.com/cybrium-ai/cyscan/' \
      #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
      #     --signature cyscan_X_TARGET.tar.gz.sig \
      #     --certificate cyscan_X_TARGET.tar.gz.pem \
      #     cyscan_X_TARGET.tar.gz
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artefacts (keyless)
        working-directory: artifacts
        env:
          COSIGN_YES: "true"
        run: |
          for f in cyscan_*.tar.gz cyscan_*.zip SHA256SUMS; do
            [ -f "$f" ] || continue
            echo "signing $f"
            cosign sign-blob \
              --output-certificate "$f.pem" \
              --output-signature "$f.sig" \
              "$f"
          done

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.ver.outputs.tag }}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          # Write to file for multi-line support
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.tag }}
          name:     cyscan v${{ steps.ver.outputs.tag }}
          body_path: /tmp/release-notes.md
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/SHA256SUMS
            artifacts/*.sig
            artifacts/*.pem

      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: cybrium-ai/homebrew-cli
          token:      ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path:       homebrew-cli

      - name: Render + commit Formula/cyscan.rb
        run: |
          VERSION="${{ steps.ver.outputs.tag }}"
          BASE="https://github.com/cybrium-ai/cyscan/releases/download/v${VERSION}"

          mkdir -p homebrew-cli/Formula
          cat > homebrew-cli/Formula/cyscan.rb <<RUBY
          class Cyscan < Formula
            desc     "Cybrium Scan — fast multi-language SAST engine"
            homepage "https://github.com/cybrium-ai/cyscan"
            license  "Apache-2.0"
            version  "${VERSION}"

            on_macos do
              on_arm do
                url    "${BASE}/cyscan_${VERSION}_aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sums.outputs.darwin_arm64_sha }}"
              end
              on_intel do
                url    "${BASE}/cyscan_${VERSION}_x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sums.outputs.darwin_amd64_sha }}"
              end
            end

            on_linux do
              on_arm do
                url    "${BASE}/cyscan_${VERSION}_aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sums.outputs.linux_arm64_sha }}"
              end
              on_intel do
                url    "${BASE}/cyscan_${VERSION}_x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.sums.outputs.linux_amd64_sha }}"
              end
            end

            def install
              bin.install "cyscan"
              (prefix/"rules").install Dir["rules/*"]
            end

            test do
              system "#{bin}/cyscan", "--version"
            end
          end
          RUBY

          cd homebrew-cli
          git config user.name  "cybrium-bot"
          git config user.email "bot@cybrium.ai"
          git add Formula/cyscan.rb
          git commit -m "cyscan: bump to v${VERSION}" || echo "no changes"
          git push
