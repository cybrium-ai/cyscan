name: CI
on:
  push:         { branches: [main] }
  pull_request: { branches: [main] }
jobs:
 test:
   runs-on: ubuntu-latest
   steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --verbose 
      - run: cargo test  --verbose
